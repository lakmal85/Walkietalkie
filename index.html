<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walkie Talkie</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #ffffff;
            --green-primary: #2ecc71;
            --green-dark: #27ae60;
            --green-light: #a8f0c0;
            --yellow-primary: #f1c40f;
            --yellow-light: #f9e79f;
            --yellow-dark: #d4ac0d;
            --gray-light: #f5f7fa;
            --gray-mid: #e2e8f0;
            --gray-dark: #64748b;
            --text-dark: #1a202c;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.10);
            --shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.18);
            --radius: 28px;
            --radius-sm: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html,
        body {
            height: 100%;
            width: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--white);
            color: var(--text-dark);
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== APP SHELL ===== */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: var(--white);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.06);
        }

        /* ===== STATUS BAR ===== */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-dark);
            background: var(--white);
            border-bottom: 1px solid var(--gray-light);
            flex-shrink: 0;
        }

        .status-bar .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            transition: var(--transition);
        }

        .status-dot.disconnected {
            background: #e74c3c;
        }
        .status-dot.connecting {
            background: var(--yellow-primary);
            animation: pulse-dot 0.8s ease-in-out infinite;
        }
        .status-dot.connected {
            background: var(--green-primary);
        }

        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.4);
                opacity: 0.6;
            }
        }

        .status-bar .room-info {
            background: var(--gray-light);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            color: var(--gray-dark);
            letter-spacing: 0.3px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px 12px;
            background: var(--white);
            flex-shrink: 0;
            border-bottom: 1px solid var(--gray-light);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h1 i {
            font-size: 18px;
            -webkit-text-fill-color: var(--green-primary);
            color: var(--green-primary);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-actions button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--gray-light);
            color: var(--gray-dark);
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-actions button:active {
            transform: scale(0.92);
        }

        .header-actions button:hover {
            background: var(--gray-mid);
        }

        /* ===== USER PROFILE / ACTIVE SPEAKER ===== */
        .speaker-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 20px 12px;
            background: var(--white);
            flex-shrink: 0;
            min-height: 160px;
            border-bottom: 1px solid var(--gray-light);
            position: relative;
            overflow: hidden;
        }

        .speaker-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green-light), var(--green-primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            font-weight: 700;
            color: var(--white);
            box-shadow: 0 4px 20px rgba(46, 204, 113, 0.30);
            transition: var(--transition);
            position: relative;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .speaker-avatar .avatar-ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 3px solid transparent;
            transition: var(--transition);
        }

        .speaker-avatar .avatar-ring.active {
            border-color: var(--yellow-primary);
            box-shadow: 0 0 0 4px rgba(241, 196, 15, 0.25);
            animation: ring-pulse 1.2s ease-in-out infinite;
        }

        @keyframes ring-pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.08);
                opacity: 1;
            }
        }

        .speaker-avatar .mic-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--yellow-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--white);
            box-shadow: 0 2px 12px rgba(241, 196, 15, 0.40);
            transition: var(--transition);
        }

        .speaker-avatar .mic-indicator.muted {
            background: var(--gray-dark);
            box-shadow: none;
        }

        .speaker-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            transition: var(--transition);
            text-align: center;
        }

        .speaker-name .name-label {
            font-weight: 400;
            color: var(--gray-dark);
            font-size: 13px;
        }

        .speaker-status {
            font-size: 12px;
            color: var(--gray-dark);
            font-weight: 500;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .speaker-status .wave-bars {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 18px;
        }

        .speaker-status .wave-bars span {
            display: inline-block;
            width: 3px;
            background: var(--green-primary);
            border-radius: 4px;
            transition: var(--transition);
            animation: none;
        }

        .speaker-status .wave-bars.active span:nth-child(1) {
            animation: wave 0.6s ease-in-out infinite 0.0s;
        }
        .speaker-status .wave-bars.active span:nth-child(2) {
            animation: wave 0.6s ease-in-out infinite 0.1s;
        }
        .speaker-status .wave-bars.active span:nth-child(3) {
            animation: wave 0.6s ease-in-out infinite 0.2s;
        }
        .speaker-status .wave-bars.active span:nth-child(4) {
            animation: wave 0.6s ease-in-out infinite 0.3s;
        }
        .speaker-status .wave-bars.active span:nth-child(5) {
            animation: wave 0.6s ease-in-out infinite 0.4s;
        }

        @keyframes wave {
            0%,
            100% {
                height: 4px;
                opacity: 0.4;
            }
            50% {
                height: 18px;
                opacity: 1;
            }
        }

        /* ===== PARTICIPANTS GRID ===== */
        .participants-section {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px 8px;
            background: var(--gray-light);
            min-height: 0;
        }

        .participants-section::-webkit-scrollbar {
            width: 3px;
        }
        .participants-section::-webkit-scrollbar-track {
            background: transparent;
        }
        .participants-section::-webkit-scrollbar-thumb {
            background: var(--gray-mid);
            border-radius: 10px;
        }

        .participants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 12px;
            padding-bottom: 8px;
        }

        .participant-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--white);
            border-radius: var(--radius-sm);
            padding: 12px 6px 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: var(--transition);
            border: 2px solid transparent;
            position: relative;
            cursor: default;
        }

        .participant-card.speaking {
            border-color: var(--yellow-primary);
            background: #fffbeb;
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(241, 196, 15, 0.18);
        }

        .participant-card .p-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green-light), var(--green-primary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
            transition: var(--transition);
            flex-shrink: 0;
            margin-bottom: 4px;
        }

        .participant-card .p-avatar.speaking-avatar {
            animation: avatar-glow 0.8s ease-in-out infinite alternate;
        }

        @keyframes avatar-glow {
            0% {
                box-shadow: 0 0 0 0 rgba(241, 196, 15, 0.3);
            }
            100% {
                box-shadow: 0 0 20px 6px rgba(241, 196, 15, 0.25);
            }
        }

        .participant-card .p-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dark);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60px;
        }

        .participant-card .p-status {
            font-size: 8px;
            color: var(--gray-dark);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .participant-card .p-status.speaking-text {
            color: var(--yellow-dark);
            font-weight: 700;
        }

        .participant-card .p-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--green-primary);
            color: white;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--white);
        }

        /* ===== PUSH-TO-TALK + CONTROLS ===== */
        .controls-section {
            padding: 12px 20px 20px;
            background: var(--white);
            border-top: 1px solid var(--gray-light);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .ptt-button {
            flex: 1;
            max-width: 280px;
            padding: 18px 24px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
            color: var(--white);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 24px rgba(46, 204, 113, 0.35);
            touch-action: manipulation;
            -webkit-touch-callout: none;
            position: relative;
            overflow: hidden;
            min-height: 64px;
        }

        .ptt-button:active {
            transform: scale(0.96);
            box-shadow: 0 2px 12px rgba(46, 204, 113, 0.25);
        }

        .ptt-button .ptt-icon {
            font-size: 22px;
            transition: var(--transition);
        }

        .ptt-button .ptt-label {
            transition: var(--transition);
        }

        .ptt-button.active {
            background: linear-gradient(135deg, var(--yellow-primary), var(--yellow-dark));
            box-shadow: 0 4px 32px rgba(241, 196, 15, 0.45);
            animation: ptt-pulse 0.6s ease-in-out infinite alternate;
        }

        @keyframes ptt-pulse {
            0% {
                box-shadow: 0 4px 24px rgba(241, 196, 15, 0.35);
            }
            100% {
                box-shadow: 0 4px 48px rgba(241, 196, 15, 0.60);
            }
        }

        .ptt-button .recording-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e74c3c;
            display: none;
            animation: blink-dot 0.8s ease-in-out infinite;
        }

        .ptt-button.recording .recording-dot {
            display: inline-block;
        }

        @keyframes blink-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.7);
            }
        }

        .ptt-button:disabled {
            opacity: 0.5;
            transform: none !important;
            cursor: not-allowed;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .controls-secondary {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .controls-secondary button {
            padding: 10px 18px;
            border: none;
            border-radius: 40px;
            background: var(--gray-light);
            color: var(--gray-dark);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            touch-action: manipulation;
        }

        .controls-secondary button:active {
            transform: scale(0.94);
        }

        .controls-secondary button.active-btn {
            background: var(--green-light);
            color: var(--green-dark);
        }

        .controls-secondary button.record-btn {
            background: #fee2e2;
            color: #dc2626;
        }

        .controls-secondary button.record-btn.recording-active {
            background: #dc2626;
            color: white;
            animation: record-pulse 1s ease-in-out infinite;
        }

        @keyframes record-pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        /* ===== SETUP / JOIN OVERLAY ===== */
        .setup-overlay {
            position: absolute;
            inset: 0;
            background: var(--white);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            transition: var(--transition);
            backdrop-filter: blur(4px);
        }

        .setup-overlay.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.04);
        }

        .setup-overlay .setup-logo {
            font-size: 56px;
            color: var(--green-primary);
            margin-bottom: 8px;
        }

        .setup-overlay h2 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .setup-overlay p {
            color: var(--gray-dark);
            font-size: 14px;
            margin-bottom: 24px;
            text-align: center;
            max-width: 300px;
        }

        .setup-overlay .form-group {
            width: 100%;
            max-width: 320px;
            margin-bottom: 14px;
        }

        .setup-overlay .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .setup-overlay .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--gray-mid);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: var(--transition);
            background: var(--gray-light);
            color: var(--text-dark);
            font-family: inherit;
        }

        .setup-overlay .form-group input:focus {
            border-color: var(--green-primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.10);
        }

        .setup-overlay .form-group input::placeholder {
            color: var(--gray-dark);
            opacity: 0.5;
        }

        .setup-overlay .form-row {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 320px;
        }

        .setup-overlay .form-row .form-group {
            flex: 1;
        }

        .setup-overlay .btn-primary {
            width: 100%;
            max-width: 320px;
            padding: 16px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
            color: var(--white);
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 24px rgba(46, 204, 113, 0.30);
            margin-top: 4px;
            font-family: inherit;
        }

        .setup-overlay .btn-primary:active {
            transform: scale(0.97);
        }

        .setup-overlay .btn-secondary {
            width: 100%;
            max-width: 320px;
            padding: 14px;
            border: 2px solid var(--gray-mid);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-dark);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            margin-top: 8px;
        }

        .setup-overlay .btn-secondary:active {
            transform: scale(0.97);
            background: var(--gray-light);
        }

        .setup-overlay .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 320px;
            margin: 12px 0;
        }

        .setup-overlay .divider::before,
        .setup-overlay .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-mid);
        }

        .setup-overlay .divider span {
            font-size: 12px;
            color: var(--gray-dark);
            font-weight: 500;
            white-space: nowrap;
        }

        .setup-overlay .connection-help {
            font-size: 12px;
            color: var(--gray-dark);
            text-align: center;
            max-width: 320px;
            margin-top: 8px;
            line-height: 1.5;
        }

        .setup-overlay .connection-help code {
            background: var(--gray-light);
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dark);
            word-break: break-all;
        }

        /* ===== TOAST / NOTIFICATION ===== */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text-dark);
            color: var(--white);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.20);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 90%;
            text-align: center;
            font-family: inherit;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .toast.success {
            background: var(--green-dark);
        }
        .toast.error {
            background: #e74c3c;
        }
        .toast.warning {
            background: var(--yellow-dark);
            color: var(--text-dark);
        }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 481px) {
            #app {
                border-radius: 32px;
                margin-top: 12px;
                margin-bottom: 12px;
                height: calc(100vh - 24px);
                max-height: 900px;
                box-shadow: 0 20px 80px rgba(0, 0, 0, 0.12);
            }
            body {
                background: var(--gray-light);
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        @media (max-width: 380px) {
            .speaker-avatar {
                width: 64px;
                height: 64px;
                font-size: 28px;
            }
            .speaker-name {
                font-size: 15px;
            }
            .ptt-button {
                font-size: 15px;
                padding: 14px 18px;
                min-height: 54px;
            }
            .participants-grid {
                grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
                gap: 8px;
            }
            .participant-card .p-avatar {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }
            .header h1 {
                font-size: 17px;
            }
        }

        /* ===== SCROLLBAR STYLING ===== */
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gray-mid);
            border-radius: 10px;
        }

        /* ===== UTILITY ===== */
        .hidden {
            display: none !important;
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== MIC PERMISSION BANNER ===== */
        .mic-permission-banner {
            background: #fef9e7;
            border: 1px solid var(--yellow-light);
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dark);
            margin: 0 16px 8px;
            flex-shrink: 0;
        }

        .mic-permission-banner i {
            color: var(--yellow-dark);
            font-size: 18px;
        }

        .mic-permission-banner button {
            background: var(--yellow-primary);
            border: none;
            padding: 6px 16px;

<body>

    <script>
        // ============================================================
        //  WALKIE TALKIE – Full WebRTC Implementation
        //  Uses manual signaling via Room Code (copy‑paste offer/answer)
        // ============================================================

        (function() {
            'use strict';

            // ----- DOM refs -----
            const $ = id => document.getElementById(id);
            const dom = {
                setupOverlay: $('setupOverlay'),
                userNameInput: $('userNameInput'),
                roomCodeInput: $('roomCodeInput'),
                joinRoomBtn: $('joinRoomBtn'),
                createRoomBtn: $('createRoomBtn'),
                connectionHelp: $('connectionHelp'),

                statusDot: $('statusDot'),
                statusText: $('statusText'),
                roomInfo: $('roomInfo'),

                speakerAvatar: $('speakerAvatar'),
                avatarInitials: $('avatarInitials'),
                avatarRing: $('avatarRing'),
                micIndicator: $('micIndicator'),
                displayName: $('displayName'),
                nameLabel: $('nameLabel'),
                statusLabel: $('statusLabel'),
                waveBars: $('waveBars'),

                participantsGrid: $('participantsGrid'),

                pttButton: $('pttButton'),
                recordBtn: $('recordBtn'),
                muteBtn: $('muteBtn'),
                speakerToggle: $('speakerToggle'),
                leaveRoomBtn: $('leaveRoomBtn'),

                micBanner: $('micBanner'),
                requestMicBtn: $('requestMicBtn'),

                toast: $('toast'),
            };

            // ----- State -----
            const state = {
                userName: 'User',
                roomCode: '',
                isConnected: false,
                isSpeaking: false,
                isMuted: false,
                isRecording: false,
                isSpeakerOn: true,
                myId: '',
                peers: new Map(), // peerId -> { conn, stream, name, avatar }
                localStream: null,
                audioContext: null,
                mediaRecorder: null,
                recordedChunks: [],
                pttPressed: false,
                isInitiator: false,
            };

            // ----- Helpers -----
            function generateId() {
                return Math.random().toString(36).substring(2, 8).toUpperCase();
            }

            function getInitials(name) {
                return name.charAt(0).toUpperCase();
            }

            function randomColor() {
                const colors = ['#2ecc71', '#f1c40f', '#3498db', '#e74c3c', '#9b59b6', '#1abc9c', '#e67e22'];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            function toast(msg, type = 'info', duration = 2500) {
                const el = dom.toast;
                el.textContent = msg;
                el.className = 'toast ' + type;
                // force reflow
                void el.offsetWidth;
                el.classList.add('show');
                clearTimeout(el._timer);
                el._timer = setTimeout(() => el.classList.remove('show'), duration);
            }

            // ----- UI Updates -----
            function updateStatus(status, text) {
                const dot = dom.statusDot;
                dot.className = 'status-dot ' + status;
                dom.statusText.textContent = text;
            }

            function updateRoomInfo(code) {
                dom.roomInfo.textContent = code ? 'කාමරය: ' + code : 'කාමරය: ---';
            }

            function updateSpeaker(name, isSpeaking, isRecording) {
                const initials = getInitials(name);
                dom.avatarInitials.textContent = initials;
                dom.displayName.textContent = name;
                dom.nameLabel.textContent = (name === state.userName) ? '(ඔබ)' : '';

                // Avatar ring
                const ring = dom.avatarRing;
                ring.className = 'avatar-ring';
                if (isSpeaking) ring.classList.add('active');
                if (isRecording) {
                    dom.speakerAvatar.classList.add('recording-avatar');
                } else {
                    dom.speakerAvatar.classList.remove('recording-avatar');
                }

                // Mic indicator
                const micIcon = dom.micIndicator.querySelector('i');
                if (state.isMuted) {
                    micIcon.className = 'fas fa-microphone-slash';
                    dom.micIndicator.className = 'mic-indicator muted';
                } else {
                    micIcon.className = 'fas fa-microphone';
                    dom.micIndicator.className = 'mic-indicator';
                }

                // Status label
                if (isSpeaking) {
                    dom.statusLabel.textContent = 'කතා කරයි...';
                    dom.waveBars.classList.add('active');
                } else if (isRecording) {
                    dom.statusLabel.textContent = 'පටිගත කරයි...';
                    dom.waveBars.classList.remove('active');
                } else {
                    dom.statusLabel.textContent = state.isMuted ? 'නිශ්ශබ්ද' : 'සූදානම්';
                    dom.waveBars.classList.remove('active');
                }

                // Name pop animation
                dom.displayName.classList.remove('pop');
                void dom.displayName.offsetWidth;
                dom.displayName.classList.add('pop');
            }

            function renderParticipants() {
                const grid = dom.participantsGrid;
                grid.innerHTML = '';

                // Self
                const selfCard = createParticipantCard(state.userName, true, false);
                grid.appendChild(selfCard);

                // Peers
                for (const [id, p] of state.peers) {
                    const card = createParticipantCard(p.name, false, p.isSpeaking || false);
                    card.dataset.peerId = id;
                    grid.appendChild(card);
                }
            }

            function createParticipantCard(name, isSelf, isSpeaking) {
                const div = document.createElement('div');
                div.className = 'participant-card';
                if (isSpeaking) div.classList.add('speaking');

                const initials = getInitials(name);
                const color = randomColor();

                div.innerHTML = `
              <div class="p-avatar ${isSpeaking ? 'speaking-avatar' : ''}" style="background:${color}">
                ${initials}
              </div>
              <div class="p-name">${name}</div>
              <div class="p-status ${isSpeaking ? 'speaking-text' : ''}">
                ${isSelf ? 'ඔබ' : ''} ${isSpeaking ? '🔊' : ''}
              </div>
              ${isSelf ? '<div class="p-badge"><i class="fas fa-check"></i></div>' : ''}
            `;
                return div;
            }

            function updatePeerSpeaking(peerId, isSpeaking) {
                const cards = dom.participantsGrid.querySelectorAll('.participant-card');
                for (const card of cards) {
                    if (card.dataset.peerId === peerId) {
                        card.classList.toggle('speaking', isSpeaking);
                        const avatar = card.querySelector('.p-avatar');
                        if (avatar) avatar.classList.toggle('speaking-avatar', isSpeaking);
                        const status = card.querySelector('.p-status');
                        if (status) {
                            status.classList.toggle('speaking-text', isSpeaking);
                            status.textContent = isSpeaking ? '🔊' : '';
                        }
                        break;
                    }
                }
            }

            // ----- WebRTC Signaling (manual) -----
            let peerConnection = null;
            let dataChannel = null;
            let isInitiator = false;
            let roomCode = '';

            // Simple signaling: we use the room code as a "session key"
            // The offer is encoded and shared via the room code.
            // In a real app, you'd use a signaling server.
            // Here we use a manual copy‑paste approach via the room code.

            // We'll encode the offer as a base64 string that the user shares.
            // For simplicity, we'll use the room code as a key to store the offer
            // in the browser's localStorage (same device) – but for cross-device,
            // the user must manually copy the offer.

            // Actually, let's use a simpler approach: the room code is used as a
            // shared secret. The initiator creates an offer, encodes it with the
            // room code, and the joiner decodes it.

            // For a truly manual system, we'll use the room code as a passphrase
            // and the offer/answer are exchanged via copy-paste.

            // Better approach: use a broadcast channel or a simple server.
            // But since we're limited to a single HTML file, we'll use a manual
            // copy-paste mechanism.

            // I'll implement a simpler version where:
            // 1. The room creator generates a room code and an offer
            // 2. The offer is displayed as text to copy
            // 3. Joiners paste the offer to connect

            // Actually, let me simplify even further: we'll use the room code
            // as a shared key. The creator generates an offer and stores it
            // in localStorage with the room code as the key.
            // Joiners can then retrieve it if they're on the same device.
            // For cross-device, they'll need to manually share the offer.

            // This is not ideal but works for demo purposes.

            // Let me use a more practical approach: the room code is used
            // to generate a unique identifier. The offer is displayed as
            // a QR code or text that the user can share.

            // I'll use the simpler approach: display the offer as text,
            // and the joiner pastes it.

            // ----- WebRTC Setup -----
            const configuration = {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                ]
            };

            let pc = null;
            let dc = null;
            let localStream = null;
            let remoteStreams = new Map(); // peerId -> MediaStream

            async function createPeerConnection() {
                if (pc) {
                    pc.close();
                    pc = null;
                }
                pc = new RTCPeerConnection(configuration);

                // Add local stream
                if (localStream) {
                    localStream.getTracks().forEach(track => {
                        pc.addTrack(track, localStream);
                    });
                }

                // Handle remote streams
                pc.ontrack = (event) => {
                    const stream = event.streams[0];
                    if (stream) {
                        const peerId = stream.id || 'peer-' + Date.now();
                        remoteStreams.set(peerId, stream);
                        // Play audio
                        playRemoteStream(stream);
                        // Update UI
                        if (!state.peers.has(peerId)) {
                            state.peers.set(peerId, {
                                name: 'Peer',
                                stream: stream,
                                isSpeaking: false,
                            });
                            renderParticipants();
                        }
                    }
                };

                pc.oniceconnectionstatechange = () => {
                    const state = pc.iceConnectionState;
                    if (state === 'connected' || state === 'completed') {
                        updateStatus('connected', 'සම්බන්ධයි');
                        dom.statusDot.className = 'status-dot connected';
                    } else if (state === 'disconnected' || state === 'failed') {
                        updateStatus('disconnected', 'විසන්ධිතයි');
                        dom.statusDot.className = 'status-dot disconnected';
                    } else if (state === 'checking') {
                        updateStatus('connecting', 'සම්බන්ධ වෙමින්...');
                        dom.statusDot.className = 'status-dot connecting';
                    }
                };

                // Data channel for signaling messages
                dc = pc.createDataChannel('walkie-data');
                dc.onopen = () => {
                    console.log('Data channel open');
                };
                dc.onmessage = (e) => {
                    try {
                        const data = JSON.parse(e.data);
                        handleDataMessage(data);
                    } catch (err) {
                        console.warn('Invalid data message', err);
                    }
                };

                pc.ondatachannel = (event) => {
                    const channel = event.channel;
                    channel.onopen = () => {
                        console.log('Data channel (incoming) open');
                    };
                    channel.onmessage = (e) => {
                        try {
                            const data = JSON.parse(e.data);
                            handleDataMessage(data);
                        } catch (err) {
                            console.warn('Invalid data message', err);
                        }
                    };
                    dc = channel;
                };

                return pc;
            }

            function playRemoteStream(stream) {
                // Use the Web Audio API to play through speaker
                const audio = new Audio();
                audio.srcObject = stream;
                audio.autoplay = true;
                audio.muted = false;
                // Force speaker mode
                if (state.isSpeakerOn) {
                    // @ts-ignore - experimental
                    if (audio.sinkId !== undefined) {
                        // Use default speaker
                    }
                }
                audio.play().catch(err => console.warn('Audio play error:', err));
                // Store for later
                stream._audioElement = audio;
            }

            // ----- Data message handling -----
            function handleDataMessage(data) {
                const { type, from, payload } = data;
                if (type === 'speaking') {
                    const peerId = from;
                    const isSpeaking = payload.isSpeaking;
                    const name = payload.name || 'Peer';
                    if (state.peers.has(peerId)) {
                        state.peers.get(peerId).isSpeaking = isSpeaking;
                        if (isSpeaking) {
                            updateSpeaker(name, true, false);
                        }
                        updatePeerSpeaking(peerId, isSpeaking);
                    }
                } else if (type === 'peer-info') {
                    const peerId = from;
                    const name = payload.name || 'Peer';
                    if (!state.peers.has(peerId)) {
                        state.peers.set(peerId, {
                            name: name,
                            stream: null,
                            isSpeaking: false,
                        });
                        renderParticipants();
                    }
                } else if (type === 'recording-status') {
                    // Handle recording status updates
                    toast(payload.name + ' පටිගත කිරීම ' + (payload.isRecording ? 'ආරම්භ කළා' : 'නැවැත්තුවා'), 'info');
                }
            }

            // ----- Send data via data channel -----
            function sendData(type, payload) {
                if (dc && dc.readyState === 'open') {
                    dc.send(JSON.stringify({
                        type: type,
                        from: state.myId,
                        payload: payload
                    }));
                }
            }

            // ----- Create offer (initiator) -----
            async function createOffer() {
                try {
                    pc = await createPeerConnection();
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    return offer;
                } catch (err) {
                    console.error('Create offer error:', err);
                    throw err;
                }
            }

            // ----- Handle answer (joiner) -----
            async function handleAnswer(answer) {
                try {
                    await pc.setRemoteDescription(new RTCSessionDescription(answer));
                } catch (err) {
                    console.error('Handle answer error:', err);
                    throw err;
                }
            }

            // ----- Join with offer (joiner creates answer) -----
            async function joinWithOffer(offerStr) {
                try {
                    const offer = JSON.parse(offerStr);
                    pc = await createPeerConnection();
                    await pc.setRemoteDescription(new RTCSessionDescription(offer));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    return answer;
                } catch (err) {
                    console.error('Join with offer error:', err);
                    throw err;
                }
            }

            // ----- Simplified connection flow -----
            // We'll use a room-based approach where:
            // - The creator generates a room code and an offer
            // - The offer is displayed as JSON
            // - Joiners paste the offer to connect

            // For simplicity, we'll store the offer in localStorage
            // and use the room code as the key.

            function storeOffer(roomCode, offer) {
                try {
                    localStorage.setItem('walkie_offer_' + roomCode, JSON.stringify(offer));
                } catch (e) {
                    console.warn('Could not store offer in localStorage', e);
                }
            }

            function getStoredOffer(roomCode) {
                try {
                    const data = localStorage.getItem('walkie_offer_' + roomCode);
                    return data ? JSON.parse(data) : null;
                } catch (e) {
                    return null;
                }
            }

            function removeStoredOffer(roomCode) {
                localStorage.removeItem('walkie_offer_' + roomCode);
            }

            // ----- Main connection logic -----
            async function connectToRoom(roomCode, userName, isInitiator) {
                try {
                    state.roomCode = roomCode;
                    state.userName = userName;
                    state.myId = generateId();

                    // Request microphone
                    if (!localStream) {
                        await requestMicrophone();
                    }

                    if (isInitiator) {
                        // Create room
                        const offer = await createOffer();
                        storeOffer(roomCode, offer);
                        // Display the offer for sharing
                        const offerStr = JSON.stringify(offer);
                        toast('කාමරය සාදන ලදී! පහත කේතය අනෙක් අයට බෙදා ගන්න.', 'success', 3000);
                        dom.connectionHelp.innerHTML = `
                  <strong>🔑 කාමර කේතය:</strong> <code>${roomCode}</code><br>
                  <span style="font-size:11px; opacity:0.7;">අනෙක් අය මෙම කේතය ඇතුළත් කර සම්බන්ධ වන්න.</span>
                `;
                        state.isInitiator = true;
                        updateRoomInfo(roomCode);
                        updateStatus('connected', 'සම්බන්ධයි (හිමිකරු)');
                        dom.statusDot.className = 'status-dot connected';
                        dom.setupOverlay.classList.add('hidden');
                        renderParticipants();
                        updateSpeaker(state.userName, false, false);
                        // Broadcast peer info
                        setTimeout(() => {
                            sendData('peer-info', { name: state.userName });
                        }, 500);
                        toast('🎤 කතා කිරීමට බොත්තම ඔබාගෙන සිටින්න!', 'info', 2500);
                    } else {
                        // Join room - try to get stored offer
                        const offer = getStoredOffer(roomCode);
                        if (!offer) {
                            toast('කාමර කේතය වලංගු නැත. කරුණාකර නිවැරදි කේතය ඇතුළත් කරන්න.', 'error', 3000);
                            return;
                        }
                        const answer = await joinWithOffer(JSON.stringify(offer));
                        // Store answer for the initiator
                        localStorage.setItem('walkie_answer_' + roomCode, JSON.stringify(answer));
                        // Notify initiator via data channel (will be established)
                        updateRoomInfo(roomCode);
                        updateStatus('connected', 'සම්බන්ධයි');
                        dom.statusDot.className = 'status-dot connected';
                        dom.setupOverlay.classList.add('hidden');
                        renderParticipants();
                        updateSpeaker(state.userName, false, false);
                        setTimeout(() => {
                            sendData('peer-info', { name: state.userName });
                        }, 500);
                        toast('🎤 කතා කිරීමට බොත්තම ඔබාගෙන සිටින්න!', 'info', 2500);
                    }

                    state.isConnected = true;

                    // Listen for answer from joiner (if initiator)
                    if (isInitiator) {
                        // Poll for answer
                        const checkAnswer = setInterval(() => {
                            const answerData = localStorage.getItem('walkie_answer_' + roomCode);
                            if (answerData) {
                                try {
                                    const answer = JSON.parse(answerData);
                                    pc.setRemoteDescription(new RTCSessionDescription(answer));
                                    localStorage.removeItem('walkie_answer_' + roomCode);
                                    clearInterval(checkAnswer);
                                    toast('නව සහභාගීවන්නෙකු සම්බන්ධ විය!', 'success', 2000);
                                    renderParticipants();
                                } catch (e) {
                                    console.warn('Invalid answer', e);
                                }
                            }
                        }, 1500);
                        // Stop after 30 seconds
                        setTimeout(() => clearInterval(checkAnswer), 30000);
                    }

                    // Start listening for speaking events
                    startSpeakingDetection();

                } catch (err) {
                    console.error('Connection error:', err);
                    toast('සම්බන්ධ වීම අසාර්ථකයි: ' + err.message, 'error', 3000);
                    updateStatus('disconnected', 'දෝෂයකි');
                }
            }

            // ----- Microphone -----
            async function requestMicrophone() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true,
                        }
                    });
                    localStream = stream;
                    state.localStream = stream;
                    dom.micBanner.classList.add('hidden');
                    // Update mic indicator
                    state.isMuted = false;
                    updateSpeaker(state.userName, false, false);
                    return stream;
                } catch (err) {
                    console.error('Microphone error:', err);
                    dom.micBanner.classList.remove('hidden');
                    toast('මයික්රොෆෝන අවසරය අවශ්‍යයි!', 'error', 3000);
                    throw err;
                }
            }

            // ----- Speaking detection (using AudioContext) -----
            let audioContext = null;
            let analyser = null;
            let dataArray = null;
            let speakingDetectionInterval = null;
            let isSpeakingNow = false;
            let speakingTimeout = null;

            function startSpeakingDetection() {
                if (speakingDetectionInterval) return;
                if (!localStream) return;

                try {
                    audioContext = new(window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 512;
                    const source = audioContext.createMediaStreamSource(localStream);
                    source.connect(analyser);
                    dataArray = new Uint8Array(analyser.fftSize);

                    let lastSpeakingState = false;

                    speakingDetectionInterval = setInterval(() => {
                        if (!analyser) return;
                        analyser.getByteTimeDomainData(dataArray);
                        let sum = 0;
                        for (let i = 0; i < dataArray.length; i++) {
                            const val = (dataArray[i] - 128) / 128;
                            sum += val * val;
                        }
                        const rms = Math.sqrt(sum / dataArray.length);
                        const threshold = 0.05;
                        const isSpeaking = rms > threshold && !state.isMuted;

                        if (isSpeaking !== lastSpeakingState) {
                            lastSpeakingState = isSpeaking;
                            if (isSpeaking) {
                                // Start speaking
                                isSpeakingNow = true;
                                updateSpeaker(state.userName, true, false);
                                // Notify peers
                                sendData('speaking', { isSpeaking: true, name: state.userName });
                                // Update self in participants
                                renderParticipants();
                            } else {
                                // Stop speaking
                                isSpeakingNow = false;
                                updateSpeaker(state.userName, false, false);
                                sendData('speaking', { isSpeaking: false, name: state.userName });
                                renderParticipants();
                            }
                        }
                    }, 150);
                } catch (err) {
                    console.warn('Speaking detection not available:', err);
                }
            }

            // ----- Push-to-Talk -----
            const pttBtn = dom.pttButton;
            let pttActive = false;

            function setupPTT() {
                // Mouse / Touch events
                const startTalk = (e) => {
                    e.preventDefault();
                    if (!state.isConnected || state.isMuted) {
                        toast(state.isMuted ? 'මයික්රොෆෝනය නිශ්ශබ්ද කර ඇත' : 'කාමරයට සම්බන්ධ නැත', 'warning', 1500);
                        return;
                    }
                    pttActive = true;
                    pttBtn.classList.add('active');
                    pttBtn.querySelector('.ptt-label').textContent = 'කතා කරමින්...';
                    pttBtn.querySelector('.ptt-icon i').className = 'fas fa-circle';
                    // Unmute if muted
                    if (state.isMuted) {
                        toggleMute(false);
                    }
                    // Force speaking state
                    isSpeakingNow = true;
                    updateSpeaker(state.userName, true, false);
                    sendData('speaking', { isSpeaking: true, name: state.userName });
                    renderParticipants();
                    // Enable audio tracks
                    if (localStream) {
                        localStream.getAudioTracks().forEach(t => t.enabled = true);
                    }
                };

                const stopTalk = (e) => {
                    e.preventDefault();
                    if (!pttActive) return;
                    pttActive = false;
                    pttBtn.classList.remove('active');
                    pttBtn.querySelector('.ptt-label').textContent = 'කතා කිරීමට ඔබන්න';
                    pttBtn.querySelector('.ptt-icon i').className = 'fas fa-microphone';
                    isSpeakingNow = false;
                    updateSpeaker(state.userName, false, false);
                    sendData('speaking', { isSpeaking: false, name: state.userName });
                    renderParticipants();
                    // Disable audio tracks
                    if (localStream) {
                        localStream.getAudioTracks().forEach(t => t.enabled = false);
                    }
                };

                pttBtn.addEventListener('mousedown', startTalk);
                pttBtn.addEventListener('mouseup', stopTalk);
                pttBtn.addEventListener('mouseleave', stopTalk);
                pttBtn.addEventListener('touchstart', startTalk, { passive: false });
                pttBtn.addEventListener('touchend', stopTalk, { passive: false });
                pttBtn.addEventListener('touchcancel', stopTalk, { passive: false });
            }

            // ----- Mute -----
            function toggleMute(muted) {
                state.isMuted = (muted !== undefined) ? muted : !state.isMuted;
                if (localStream) {
                    localStream.getAudioTracks().forEach(t => {
                        t.enabled = !state.isMuted;
                    });
                }
                if (state.isMuted) {
                    dom.muteBtn.innerHTML = '<i class="fas fa-microphone-slash"></i> නිශ්ශබ්ද';
                    dom.muteBtn.classList.remove('active-btn');
                    dom.muteBtn.classList.add('record-btn');
                    if (isSpeakingNow) {
                        isSpeakingNow = false;
                        updateSpeaker(state.userName, false, false);
                        sendData('speaking', { isSpeaking: false, name: state.userName });
                        renderParticipants();
                    }
                } else {
                    dom.muteBtn.innerHTML = '<i class="fas fa-microphone"></i> මයික්';
                    dom.muteBtn.classList.add('active-btn');
                    dom.muteBtn.classList.remove('record-btn');
                }
                updateSpeaker(state.userName, isSpeakingNow || false, false);
                toast(state.isMuted ? 'මයික්රොෆෝනය නිශ්ශබ්ද කර ඇත' : 'මයික්රොෆෝනය සක්‍රියයි', 'info', 1500);
            }

            // ----- Recording -----
            let mediaRecorder = null;
            let recordedChunks = [];
            let isRecording = false;

            function toggleRecording() {
                if (!localStream) {
                    toast('මයික්රොෆෝනය සොයා ගත නොහැක', 'error', 1500);
                    return;
                }
                if (isRecording) {
                    // Stop recording
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                    isRecording = false;
                    dom.recordBtn.classList.remove('recording-active');
                    dom.recordBtn.innerHTML = '<i class="fas fa-circle"></i> පටිගත කරන්න';
                    toast('පටිගත කිරීම නැවැත්වූවා', 'info', 1500);
                    sendData('recording-status', { isRecording: false, name: state.userName });
                } else {
                    // Start recording
                    try {
                        recordedChunks = [];
                        mediaRecorder = new MediaRecorder(localStream, {
                            mimeType: 'audio/webm;codecs=opus'
                        });
                        mediaRecorder.ondataavailable = (e) => {
                            if (e.data.size > 0) {
                                recordedChunks.push(e.data);
                            }
                        };
                        mediaRecorder.onstop = () => {
                            const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = `walkie-${Date.now()}.webm`;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            setTimeout(() => URL.revokeObjectURL(url), 5000);
                            toast('පටිගත කිරීම සුරැකුණි!', 'success', 2000);
                            recordedChunks = [];
                        };
                        mediaRecorder.start(1000);
                        isRecording = true;
                        dom.recordBtn.classList.add('recording-active');
                        dom.recordBtn.innerHTML = '<i class="fas fa-stop"></i> නවත්වන්න';
                        toast('🔴 පටිගත කිරීම ආරම්භ කළා', 'warning', 1500);
                        sendData('recording-status', { isRecording: true, name: state.userName });
                        // Visual feedback
                        updateSpeaker(state.userName, isSpeakingNow || false, true);
                    } catch (err) {
                        console.error('Recording error:', err);
                        toast('පටිගත කිරීම අසාර්ථකයි: ' + err.message, 'error', 2000);
                    }
                }
            }

            // ----- Speaker toggle -----
            function toggleSpeaker() {
                state.isSpeakerOn = !state.isSpeakerOn;
                dom.speakerToggle.innerHTML = state.isSpeakerOn ?
                    '<i class="fas fa-volume-up"></i>' :
                    '<i class="fas fa-volume-mute"></i>';
                // Apply to all audio elements
                document.querySelectorAll('audio').forEach(a => {
                    a.muted = !state.isSpeakerOn;
                });
                toast(state.isSpeakerOn ? 'ස්පීකර් සක්‍රියයි' : 'ස්පීකර් අක්‍රියයි', 'info', 1200);
            }

            // ----- Leave room -----
            function leaveRoom() {
                // Close peer connection
                if (pc) {
                    pc.close();
                    pc = null;
                }
                if (dc) {
                    dc.close();
                    dc = null;
                }
                // Clean up
                state.peers.clear();
                state.isConnected = false;
                state.isInitiator = false;
                remoteStreams.clear();
                // Stop speaking detection
                if (speakingDetectionInterval) {
                    clearInterval(speakingDetectionInterval);
                    speakingDetectionInterval = null;
                }
                // Reset UI
                updateStatus('disconnected', 'විසන්ධිතයි');
                dom.statusDot.className = 'status-dot disconnected';
                updateRoomInfo('');
                dom.setupOverlay.classList.remove('hidden');
                dom.connectionHelp.innerHTML =
                    '<span>🔗 කාමර කේතය බෙදා ගන්න. සියලුම දෙනා එකම කාමර කේතය භාවිතා කළ යුතුය.</span>';
                dom.participantsGrid.innerHTML = '';
                updateSpeaker('---', false, false);
                // Reset PTT
                pttBtn.classList.remove('active');
                pttBtn.querySelector('.ptt-label').textContent = 'කතා කිරීමට ඔබන්න';
                pttBtn.querySelector('.ptt-icon i').className = 'fas fa-microphone';
                // Reset recording
                if (isRecording) {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                    isRecording = false;
                    dom.recordBtn.classList.remove('recording-active');
                    dom.recordBtn.innerHTML = '<i class="fas fa-circle"></i> පටිගත කරන්න';
                }
                // Reset mute
                if (state.isMuted) {
                    toggleMute(false);
                }
                toast('කාමරයෙන් පිටව ගියා', 'info', 1500);
                // Remove stored offers
                if (state.roomCode) {
                    removeStoredOffer(state.roomCode);
                    localStorage.removeItem('walkie_answer_' + state.roomCode);
                }
                state.roomCode = '';
            }

            // ----- Setup UI events -----
            function setupUI() {
                // Join room
                dom.joinRoomBtn.addEventListener('click', async () => {
                    const name = dom.userNameInput.value.trim() || 'User';
                    const code = dom.roomCodeInput.value.trim().toUpperCase() || generateId();
                    state.userName = name;
                    dom.roomCodeInput.value = code;
                    try {
                        await connectToRoom(code, name, false);
                    } catch (err) {
                        console.error(err);
                    }
                });

                // Create room
                dom.createRoomBtn.addEventListener('click', async () => {
                    const name = dom.userNameInput.value.trim() || 'User';
                    const code = generateId();
                    state.userName = name;
                    dom.roomCodeInput.value = code;
                    try {
                        await connectToRoom(code, name, true);
                    } catch (err) {
                        console.error(err);
                    }
                });

                // Enter key for join
                dom.roomCodeInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') dom.joinRoomBtn.click();
                });
                dom.userNameInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') dom.joinRoomBtn.click();
                });

                // PTT setup
                setupPTT();

                // Mute
                dom.muteBtn.addEventListener('click', () => toggleMute());

                // Record
                dom.recordBtn.addEventListener('click', toggleRecording);

                // Speaker
                dom.speakerToggle.addEventListener('click', toggleSpeaker);

                // Leave
                dom.leaveRoomBtn.addEventListener('click', () => {
                    if (confirm('කාමරයෙන් පිටවීමට අවශ්‍යද?')) {
                        leaveRoom();
                    }
                });

                // Request mic
                dom.requestMicBtn.addEventListener('click', async () => {
                    try {
                        await requestMicrophone();
                        toast('මයික්රොෆෝනය සක්‍රියයි!', 'success', 1500);
                    } catch (err) {
                        toast('මයික්රොෆෝන අවසරය ප්‍රතික්ෂේප කරන ලදී', 'error', 2000);
                    }
                });

                // Auto-generate room code on load
                dom.roomCodeInput.value = generateId();

                // Try to get mic on load
                setTimeout(async () => {
                    try {
                        await requestMicrophone();
                    } catch (e) {
                        // Show banner
                        dom.micBanner.classList.remove('hidden');
                    }
                }, 500);
            }

            // ----- Init -----
            function init() {
                setupUI();
                updateStatus('disconnected', 'විසන්ධිතයි');
                dom.statusDot.className = 'status-dot disconnected';
                updateRoomInfo('');
                updateSpeaker('---', false, false);
                renderParticipants();
                // Show setup
                dom.setupOverlay.classList.remove('hidden');
            }

            // Handle visibility change - re-enable audio when coming back
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden && localStream) {
                    localStream.getAudioTracks().forEach(t => {
                        if (!state.isMuted && pttActive) {
                            t.enabled = true;
                        }
                    });
                }
            });

            // Handle page unload
            window.addEventListener('beforeunload', () => {
                if (pc) pc.close();
                if (localStream) {
                    localStream.getTracks().forEach(t => t.stop());
                }
                if (audioContext) audioContext.close();
            });

            // Start
            init();

        })();
    </script>

</body>
