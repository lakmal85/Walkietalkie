<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Walkie Talkie</title>

    <!-- PeerJS for WebRTC -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js">
    </script>

    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #ffffff;
            color: #1e2b3a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .app-container {
            max-width: 420px;
            width: 100%;
            background: #ffffff;
            border-radius: 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            padding: 20px 20px 30px;
            position: relative;
            border: 1px solid rgba(46, 125, 50, 0.10);
        }

        /* ---------- COLORS ---------- */
        :root {
            --green: #2E7D32;
            --green-light: #4CAF50;
            --green-bg: #E8F5E9;
            --yellow: #F9A825;
            --yellow-light: #FFD54F;
            --yellow-bg: #FFF8E1;
            --white: #ffffff;
            --dark: #1e2b3a;
            --gray: #78909C;
            --gray-light: #ECEFF1;
            --shadow: 0 8px 32px rgba(46, 125, 50, 0.12);
        }

        /* ---------- HEADER ---------- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 14px;
            border-bottom: 2px solid var(--gray-light);
            margin-bottom: 18px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--green);
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1 span {
            background: var(--green-bg);
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            color: var(--green);
        }
        .room-badge {
            background: var(--yellow-bg);
            color: var(--yellow);
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(249, 168, 37, 0.25);
        }
        .room-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green-light);
            animation: pulse-dot 1.8s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.7);
            }
        }

        /* ---------- JOIN SCREEN ---------- */
        .join-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            padding: 40px 12px 20px;
        }
        .join-screen .logo {
            font-size: 52px;
            margin-bottom: 4px;
        }
        .join-screen h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
        }
        .join-screen p {
            color: var(--gray);
            font-size: 14px;
            text-align: center;
            max-width: 280px;
            line-height: 1.5;
        }
        .join-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 6px;
        }
        .join-form input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid var(--gray-light);
            border-radius: 16px;
            font-size: 16px;
            background: #fafafa;
            transition: border 0.25s, box-shadow 0.25s;
            outline: none;
            color: var(--dark);
        }
        .join-form input:focus {
            border-color: var(--green-light);
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.12);
            background: #ffffff;
        }
        .join-form input::placeholder {
            color: #b0bec5;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: var(--green);
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(46, 125, 50, 0.25);
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(46, 125, 50, 0.20);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        .btn-secondary {
            padding: 12px 20px;
            border: 2px solid var(--gray-light);
            border-radius: 14px;
            background: transparent;
            color: var(--dark);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-secondary:active {
            background: var(--gray-light);
        }

        /* ---------- MAIN WALKIE SCREEN ---------- */
        .walkie-screen {
            display: none;
            flex-direction: column;
            gap: 14px;
        }
        .walkie-screen.active {
            display: flex;
        }

        /* ---- Speaker display ---- */
        .speaker-display {
            background: var(--green-bg);
            border-radius: 24px;
            padding: 18px 16px 16px;
            text-align: center;
            position: relative;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.5s;
            border: 1px solid rgba(46, 125, 50, 0.08);
        }
        .speaker-display.speaking {
            background: var(--yellow-bg);
            border-color: rgba(249, 168, 37, 0.25);
        }
        .speaker-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            color: #fff;
            font-weight: 600;
            margin-bottom: 8px;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.20);
            position: relative;
            overflow: hidden;
            user-select: none;
        }
        .speaker-avatar .ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 3px solid transparent;
            transition: border-color 0.4s, transform 0.6s;
        }
        .speaker-avatar .ring.active {
            border-color: var(--yellow);
            transform: scale(1.08);
            animation: ring-pulse 1.2s ease-in-out infinite;
        }
        @keyframes ring-pulse {
            0%,
            100% {
                transform: scale(1.08);
                opacity: 0.7;
            }
            50% {
                transform: scale(1.22);
                opacity: 0.2;
            }
        }
        .speaker-avatar .wave-ring {
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            border: 2px solid rgba(249, 168, 37, 0.15);
            animation: wave-expand 1.8s ease-out infinite;
        }
        .speaker-avatar .wave-ring:nth-child(2) {
            animation-delay: 0.6s;
        }
        .speaker-avatar .wave-ring:nth-child(3) {
            animation-delay: 1.2s;
        }
        @keyframes wave-expand {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.8);
                opacity: 0;
            }
        }
        .speaker-avatar.speaking-avatar {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(249, 168, 37, 0.35);
        }
        .speaker-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--dark);
            transition: color 0.3s;
        }
        .speaker-name.speaking-name {
            color: var(--green);
        }
        .speaker-status {
            font-size: 13px;
            color: var(--gray);
            margin-top: 2px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }
        .speaker-status .live-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e53935;
            animation: blink 1s ease-in-out infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.2;
            }
        }
        .speaker-status .idle-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gray-light);
        }

        /* ---- Sound visualization ---- */
        .sound-visual {
            background: #f8fafc;
            border-radius: 16px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0 12px;
            border: 1px solid var(--gray-light);
            overflow: hidden;
            position: relative;
        }
        .sound-visual .bar {
            width: 5px;
            border-radius: 4px;
            background: var(--gray-light);
            transition: height 0.08s ease-out, background 0.2s;
            height: 6px;
            min-height: 3px;
            flex-shrink: 0;
        }
        .sound-visual .bar.active {
            background: var(--green-light);
        }
        .sound-visual .bar.loud {
            background: var(--yellow);
        }
        .sound-visual .bar.very-loud {
            background: #e53935;
        }

        /* ---- Controls ---- */
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 2px;
        }
        .controls .btn-talk {
            flex: 1;
            padding: 18px 12px;
            border: none;
            border-radius: 20px;
            background: var(--green);
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(46, 125, 50, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            touch-action: manipulation;
            user-select: none;
            -webkit-touch-callout: none;
            position: relative;
        }
        .controls .btn-talk:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(46, 125, 50, 0.15);
        }
        .controls .btn-talk.talking {
            background: var(--yellow);
            box-shadow: 0 4px 20px rgba(249, 168, 37, 0.35);
            color: var(--dark);
        }
        .controls .btn-talk.talking:active {
            transform: scale(0.96);
        }
        .controls .btn-talk:disabled {
            opacity: 0.4;
            transform: none;
            cursor: not-allowed;
            box-shadow: none;
        }
        .controls .btn-talk .mic-icon {
            font-size: 22px;
            line-height: 1;
        }
        .controls .btn-talk .talk-label {
            font-size: 15px;
        }

        .btn-icon {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            border: 2px solid var(--gray-light);
            background: #ffffff;
            font-size: 22px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            touch-action: manipulation;
            user-select: none;
            -webkit-touch-callout: none;
            color: var(--dark);
        }
        .btn-icon:active {
            transform: scale(0.92);
        }
        .btn-icon.recording {
            border-color: #e53935;
            background: #ffebee;
            color: #e53935;
            animation: record-pulse 1.2s ease-in-out infinite;
        }
        @keyframes record-pulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.25);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(229, 57, 53, 0);
            }
        }
        .btn-icon .badge-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e53935;
            display: none;
        }
        .btn-icon.recording .badge-dot {
            display: block;
        }

        /* ---- Peer list ---- */
        .peer-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 0 2px;
            justify-content: center;
        }
        .peer-chip {
            background: var(--gray-light);
            padding: 6px 14px 6px 10px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid transparent;
            transition: border-color 0.2s, background 0.2s;
        }
        .peer-chip .chip-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--green);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }
        .peer-chip.active-speaker {
            border-color: var(--yellow);
            background: var(--yellow-bg);
        }
        .peer-chip .chip-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--gray);
        }
        .peer-chip.active-speaker .chip-dot {
            background: var(--yellow);
            animation: pulse-dot 0.8s ease-in-out infinite;
        }

        /* ---- Connection status ---- */
        .conn-status {
            font-size: 12px;
            color: var(--gray);
            text-align: center;
            padding: 6px 0 0;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .conn-status .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gray-light);
        }
        .conn-status .status-dot.online {
            background: var(--green-light);
        }
        .conn-status .status-dot.error {
            background: #e53935;
        }

        /* ---------- TOAST ---------- */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--dark);
            color: #fff;
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
            z-index: 999;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 440px) {
            .app-container {
                padding: 16px 16px 24px;
                border-radius: 28px;
            }
            .speaker-avatar {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }
            .controls .btn-talk {
                padding: 16px 10px;
                font-size: 16px;
            }
            .btn-icon {
                width: 50px;
                height: 50px;
                font-size: 19px;
            }
            .header h1 {
                font-size: 17px;
            }
            .room-badge {
                font-size: 11px;
                padding: 3px 12px;
            }
        }
        @media (max-width: 370px) {
            .speaker-avatar {
                width: 50px;
                height: 50px;
                font-size: 22px;
            }
            .controls .btn-talk {
                font-size: 14px;
                padding: 14px 8px;
            }
            .btn-icon {
                width: 44px;
                height: 44px;
                font-size: 17px;
            }
        }

        /* ---------- UTILITY ---------- */
        .hidden {
            display: none !important;
        }
        .text-center {
            text-align: center;
        }
        .mt-2 {
            margin-top: 8px;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--gray-light);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--green-light);
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- ====== TOAST ====== -->
    <div id="toast" class="toast"></div>

    <!-- ====== APP ====== -->
    <div class="app-container" id="app">

        <!-- ====== HEADER ====== -->
        <div class="header">
            <h1>
                📻 Walkie
                <span>Live</span>
            </h1>
            <div class="room-badge" id="roomBadge">
                <span class="dot"></span>
                <span id="roomNameDisplay">---</span>
            </div>
        </div>

        <!-- ====== JOIN SCREEN ====== -->
        <div class="join-screen" id="joinScreen">
            <div class="logo">🎙️</div>
            <h2>Join a Room</h2>
            <p>Enter a room name and your display name to start talking.</p>
            <div class="join-form">
                <input type="text" id="roomInput" placeholder="Room name (e.g. team-alpha)" value="demo-room" />
                <input type="text" id="nameInput" placeholder="Your name" value="User" />
                <button class="btn-primary" id="joinBtn">
                    <span>🔊</span> Join &amp; Talk
                </button>
            </div>
            <div style="font-size:13px;color:var(--gray);margin-top:4px;">
                ⚡ All devices in the same room can talk
            </div>
        </div>

        <!-- ====== WALKIE SCREEN ====== -->
        <div class="walkie-screen" id="walkieScreen">

            <!-- Speaker display -->
            <div class="speaker-display" id="speakerDisplay">
                <div class="speaker-avatar" id="speakerAvatar">
                    <span id="avatarEmoji">👤</span>
                    <div class="ring" id="ringEffect"></div>
                    <div class="wave-ring"></div>
                    <div class="wave-ring"></div>
                    <div class="wave-ring"></div>
                </div>
                <div class="speaker-name" id="speakerName">Waiting...</div>
                <div class="speaker-status" id="speakerStatus">
                    <span class="idle-badge" id="statusBadge"></span>
                    <span id="statusText">Idle</span>
                </div>
            </div>

            <!-- Sound visualization -->
            <div class="sound-visual" id="soundVisual">
                <!-- 24 bars, generated by JS -->
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="btn-talk" id="talkBtn">
                    <span class="mic-icon">🎤</span>
                    <span class="talk-label">Hold to Talk</span>
                </button>
                <button class="btn-icon" id="recordBtn" title="Record">
                    <span class="badge-dot"></span>
                    <span id="recordIcon">⏺️</span>
                </button>
            </div>

            <!-- Peer list -->
            <div class="peer-list" id="peerList"></div>

            <!-- Connection status -->
            <div class="conn-status" id="connStatus">
                <span class="status-dot" id="connDot"></span>
                <span id="connText">Connecting...</span>
            </div>

            <!-- Leave button -->
            <button class="btn-secondary" id="leaveBtn" style="margin-top:6px;width:100%;">
                🚪 Leave Room
            </button>
        </div>

    </div>

    <script>
        // ================================================================
        //  WALKIE-TALKIE — Full implementation
        // ================================================================

        (function() {
            'use strict';

            // -------- DOM refs --------
            const joinScreen = document.getElementById('joinScreen');
            const walkieScreen = document.getElementById('walkieScreen');
            const roomInput = document.getElementById('roomInput');
            const nameInput = document.getElementById('nameInput');
            const joinBtn = document.getElementById('joinBtn');
            const leaveBtn = document.getElementById('leaveBtn');
            const roomNameDisplay = document.getElementById('roomNameDisplay');

            const speakerDisplay = document.getElementById('speakerDisplay');
            const speakerAvatar = document.getElementById('speakerAvatar');
            const avatarEmoji = document.getElementById('avatarEmoji');
            const ringEffect = document.getElementById('ringEffect');
            const speakerName = document.getElementById('speakerName');
            const speakerStatus = document.getElementById('speakerStatus');
            const statusBadge = document.getElementById('statusBadge');
            const statusText = document.getElementById('statusText');

            const soundVisual = document.getElementById('soundVisual');
            const talkBtn = document.getElementById('talkBtn');
            const recordBtn = document.getElementById('recordBtn');
            const recordIcon = document.getElementById('recordIcon');
            const peerList = document.getElementById('peerList');
            const connStatus = document.getElementById('connStatus');
            const connDot = document.getElementById('connDot');
            const connText = document.getElementById('connText');

            const toast = document.getElementById('toast');

            // -------- State --------
            let peer = null; // PeerJS instance
            let connections = {}; // peerId -> MediaConnection
            let localStream = null;
            let audioContext = null;
            let analyser = null;
            let dataArray = null;
            let animationId = null;
            let isTalking = false;
            let isRecording = false;
            let mediaRecorder = null;
            let recordedChunks = [];
            let currentRoom = '';
            let currentName = '';
            let myPeerId = '';
            let isSpeakerActive = false; // whether someone is speaking
            let speakerPeerId = null; // who is speaking
            let peerIdToName = {}; // mapping for display
            let peerIdToEmoji = {};

            // -------- Toast --------
            let toastTimer = null;

            function showToast(msg, duration = 2800) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
            }

            // -------- Audio helpers --------
            function getEmojiForName(name) {
                const emojis = ['👤', '🧑', '👩', '👨', '🧔', '👧', '👦', '👶', '🧒', '👨‍🦰', '👩‍🦰', '🧑‍🦰',
                    '👨‍🦱', '👩‍🦱', '🧑‍🦱', '👨‍🦳', '👩‍🦳', '🧑‍🦳', '👨‍🦲', '👩‍🦲', '🧑‍🦲'
                ];
                let hash = 0;
                for (let i = 0; i < name.length; i++) {
                    hash = (hash * 31 + name.charCodeAt(i)) & 0x7fffffff;
                }
                return emojis[hash % emojis.length] || '👤';
            }

            function getInitials(name) {
                return name.charAt(0).toUpperCase();
            }

            // -------- Build sound visual bars --------
            const BAR_COUNT = 28;

            function buildBars() {
                soundVisual.innerHTML = '';
                for (let i = 0; i < BAR_COUNT; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'bar';
                    bar.style.height = '4px';
                    soundVisual.appendChild(bar);
                }
            }
            buildBars();

            function updateBars(level) {
                const bars = soundVisual.querySelectorAll('.bar');
                const count = bars.length;
                // level 0..1
                const scaled = Math.min(level * 1.6, 1);
                const height = 4 + scaled * 40; // 4..44px
                const half = Math.floor(count / 2);
                for (let i = 0; i < count; i++) {
                    const dist = Math.abs(i - half) / half;
                    const factor = 1 - dist * 0.6;
                    const h = height * factor;
                    bars[i].style.height = Math.max(3, h) + 'px';
                    bars[i].classList.toggle('active', h > 10);
                    bars[i].classList.toggle('loud', h > 28);
                    bars[i].classList.toggle('very-loud', h > 40);
                }
            }

            function resetBars() {
                const bars = soundVisual.querySelectorAll('.bar');
                bars.forEach(b => {
                    b.style.height = '4px';
                    b.classList.remove('active', 'loud', 'very-loud');
                });
            }

            // -------- Audio context & analyser --------
            function initAudioContext() {
                if (!audioContext) {
                    audioContext = new(window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    analyser.smoothingTimeConstant = 0.7;
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                }
                return audioContext;
            }

            function getAudioLevel() {
                if (!analyser) return 0;
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    sum += dataArray[i];
                }
                const avg = sum / dataArray.length;
                return avg / 255; // 0..1
            }

            // -------- Animation loop (sound visual + speaker animation) --------
            function startAnimation() {
                if (animationId) return;
                let lastLevel = 0;
                let levelSmooth = 0;

                function loop() {
                    const level = getAudioLevel();
                    // smooth
                    levelSmooth = levelSmooth * 0.6 + level * 0.4;
                    const displayLevel = Math.min(levelSmooth * 1.2, 1);

                    // update bars
                    if (isTalking || isSpeakerActive) {
                        updateBars(displayLevel);
                    } else {
                        resetBars();
                    }

                    // speaker animation based on level
                    const isSpeakingNow = displayLevel > 0.06;
                    if (isSpeakingNow && (isTalking || isSpeakerActive)) {
                        speakerDisplay.classList.add('speaking');
                        speakerAvatar.classList.add('speaking-avatar');
                        ringEffect.classList.add('active');
                        speakerName.classList.add('speaking-name');
                        statusBadge.className = 'live-badge';
                        statusText.textContent = '🔊 Speaking';
                        isSpeakerActive = true;
                    } else if (isTalking || isSpeakerActive) {
                        // keep active state but lower intensity if level is low
                        if (isTalking) {
                            // when holding talk but silent, show idle
                            if (displayLevel < 0.03) {
                                speakerDisplay.classList.remove('speaking');
                                speakerAvatar.classList.remove('speaking-avatar');
                                ringEffect.classList.remove('active');
                                speakerName.classList.remove('speaking-name');
                                statusBadge.className = 'idle-badge';
                                statusText.textContent = '🎙️ Ready';
                            }
                        } else {
                            // remote speaker
                            if (displayLevel < 0.03 && isSpeakerActive) {
                                // speaker stopped talking
                                isSpeakerActive = false;
                                speakerDisplay.classList.remove('speaking');
                                speakerAvatar.classList.remove('speaking-avatar');
                                ringEffect.classList.remove('active');
                                speakerName.classList.remove('speaking-name');
                                statusBadge.className = 'idle-badge';
                                statusText.textContent = 'Idle';
                                resetBars();
                            }
                        }
                    } else {
                        speakerDisplay.classList.remove('speaking');
                        speakerAvatar.classList.remove('speaking-avatar');
                        ringEffect.classList.remove('active');
                        speakerName.classList.remove('speaking-name');
                        statusBadge.className = 'idle-badge';
                        statusText.textContent = 'Idle';
                        resetBars();
                    }

                    animationId = requestAnimationFrame(loop);
                }
                loop();
            }

            function stopAnimation() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                resetBars();
                speakerDisplay.classList.remove('speaking');
                speakerAvatar.classList.remove('speaking-avatar');
                ringEffect.classList.remove('active');
                speakerName.classList.remove('speaking-name');
                statusBadge.className = 'idle-badge';
                statusText.textContent = 'Idle';
                isSpeakerActive = false;
            }

            // -------- Update speaker display for remote --------
            function setRemoteSpeaker(peerId, name) {
                const emoji = peerIdToEmoji[peerId] || '👤';
                avatarEmoji.textContent = emoji;
                speakerName.textContent = name || 'Unknown';
                speakerDisplay.classList.add('speaking');
                speakerAvatar.classList.add('speaking-avatar');
                ringEffect.classList.add('active');
                speakerName.classList.add('speaking-name');
                statusBadge.className = 'live-badge';
                statusText.textContent = '🔊 Speaking';
                isSpeakerActive = true;
                speakerPeerId = peerId;

                // highlight in peer list
                document.querySelectorAll('.peer-chip').forEach(el => {
                    el.classList.toggle('active-speaker', el.dataset.peerId === peerId);
                });
            }

            function clearRemoteSpeaker() {
                isSpeakerActive = false;
                speakerPeerId = null;
                speakerDisplay.classList.remove('speaking');
                speakerAvatar.classList.remove('speaking-avatar');
                ringEffect.classList.remove('active');
                speakerName.classList.remove('speaking-name');
                statusBadge.className = 'idle-badge';
                statusText.textContent = 'Idle';
                resetBars();
                document.querySelectorAll('.peer-chip').forEach(el => {
                    el.classList.remove('active-speaker');
                });
                // if we have a name, show it but idle
                if (currentName) {
                    speakerName.textContent = currentName + ' (you)';
                    avatarEmoji.textContent = getEmojiForName(currentName);
                } else {
                    speakerName.textContent = 'Waiting...';
                    avatarEmoji.textContent = '👤';
                }
            }

            // -------- Render peer list --------
            function renderPeerList() {
                const ids = Object.keys(connections);
                peerList.innerHTML = '';
                if (ids.length === 0) {
                    const chip = document.createElement('span');
                    chip.className = 'peer-chip';
                    chip.textContent = '👤 No others connected';
                    chip.style.opacity = '0.6';
                    peerList.appendChild(chip);
                    return;
                }
                // show self first
                const selfChip = document.createElement('span');
                selfChip.className = 'peer-chip';
                selfChip.style.borderColor = 'var(--green-light)';
                selfChip.style.background = 'var(--green-bg)';
                selfChip.innerHTML = `
              <span class="chip-avatar" style="background:var(--green-light);">${getInitials(currentName)}</span>
              ${currentName} (you)
              <span class="chip-dot" style="background:var(--green-light);"></span>
            `;
                peerList.appendChild(selfChip);

                ids.forEach(id => {
                    const name = peerIdToName[id] || id.slice(0, 8);
                    const emoji = peerIdToEmoji[id] || '👤';
                    const chip = document.createElement('span');
                    chip.className = 'peer-chip';
                    chip.dataset.peerId = id;
                    chip.innerHTML = `
                <span class="chip-avatar">${emoji}</span>
                ${name}
                <span class="chip-dot"></span>
              `;
                    if (id === speakerPeerId && isSpeakerActive) {
                        chip.classList.add('active-speaker');
                    }
                    peerList.appendChild(chip);
                });
            }

            // -------- Connect to a peer --------
            function connectToPeer(peerId) {
                if (peerId === myPeerId) return;
                if (connections[peerId]) return;
                if (!peer) return;

                showToast(`🔗 Connecting to ${peerIdToName[peerId] || peerId}...`, 2000);

                const conn = peer.connect(peerId, {
                    reliable: true
                });
                conn.on('open', () => {
                    showToast(`✅ Connected to ${peerIdToName[peerId] || peerId}`, 2000);
                    // send our name
                    conn.send({ type: 'name', name: currentName, emoji: getEmojiForName(currentName) });
                });
                conn.on('data', (data) => {
                    if (data.type === 'name') {
                        peerIdToName[peerId] = data.name;
                        peerIdToEmoji[peerId] = data.emoji || '👤';
                        renderPeerList();
                        if (speakerPeerId === peerId) {
                            speakerName.textContent = data.name;
                            avatarEmoji.textContent = data.emoji || '👤';
                        }
                    }
                });
                conn.on('close', () => {
                    showToast(`❌ ${peerIdToName[peerId] || peerId} disconnected`, 2000);
                    delete connections[peerId];
                    delete peerIdToName[peerId];
                    delete peerIdToEmoji[peerId];
                    if (speakerPeerId === peerId) clearRemoteSpeaker();
                    renderPeerList();
                    updateConnStatus();
                });

                // Also call the peer for audio
                const mediaConn = peer.call(peerId, localStream);
                mediaConn.on('stream', (remoteStream) => {
                    handleRemoteStream(remoteStream, peerId);
                });
                mediaConn.on('close', () => {
                    if (connections[peerId]) {
                        delete connections[peerId];
                        if (speakerPeerId === peerId) clearRemoteSpeaker();
                        renderPeerList();
                        updateConnStatus();
                    }
                });

                connections[peerId] = mediaConn;
                // also store the data connection
                connections[`${peerId}_data`] = conn;
                renderPeerList();
                updateConnStatus();
            }

            // -------- Handle incoming call --------
            function handleIncomingCall(call) {
                const peerId = call.peer;
                if (connections[peerId]) {
                    call.answer(localStream);
                    return;
                }
                // answer with our stream
                call.answer(localStream);
                call.on('stream', (remoteStream) => {
                    handleRemoteStream(remoteStream, peerId);
                });
                call.on('close', () => {
                    if (connections[peerId]) {
                        delete connections[peerId];
                        if (speakerPeerId === peerId) clearRemoteSpeaker();
                        renderPeerList();
                        updateConnStatus();
                    }
                });
                connections[peerId] = call;

                // also try to establish data connection
                const dataConn = peer.connect(peerId, { reliable: true });
                dataConn.on('open', () => {
                    dataConn.send({ type: 'name', name: currentName, emoji: getEmojiForName(currentName) });
                });
                dataConn.on('data', (data) => {
                    if (data.type === 'name') {
                        peerIdToName[peerId] = data.name;
                        peerIdToEmoji[peerId] = data.emoji || '👤';
                        renderPeerList();
                        if (speakerPeerId === peerId) {
                            speakerName.textContent = data.name;
                            avatarEmoji.textContent = data.emoji || '👤';
                        }
                    }
                });
                connections[`${peerId}_data`] = dataConn;

                renderPeerList();
                updateConnStatus();
                showToast(`📞 ${peerIdToName[peerId] || peerId} joined`, 2000);
            }

            // -------- Handle remote audio stream --------
            let remoteAudioElements = {};

            function handleRemoteStream(stream, peerId) {
                // create audio element
                const audio = new Audio();
                audio.srcObject = stream;
                audio.autoplay = true;
                audio.volume = 1.0;
                audio.play().catch(() => {});
                remoteAudioElements[peerId] = audio;

                // set speaker display
                const name = peerIdToName[peerId] || peerId.slice(0, 8);
                const emoji = peerIdToEmoji[peerId] || '👤';
                setRemoteSpeaker(peerId, name);
                avatarEmoji.textContent = emoji;

                // analyze remote audio for visualization
                const ctx = initAudioContext();
                const source = ctx.createMediaStreamSource(stream);
                const remoteAnalyser = ctx.createAnalyser();
                remoteAnalyser.fftSize = 256;
                remoteAnalyser.smoothingTimeConstant = 0.7;
                source.connect(remoteAnalyser);

                // store analyser for this peer
                remoteAudioElements[`${peerId}_analyser`] = remoteAnalyser;

                // start animation if not running
                startAnimation();

                // override getAudioLevel to use remote analyser when remote is speaking
                const origGetLevel = getAudioLevel;
                const newGetLevel = () => {
                    if (isSpeakerActive && speakerPeerId === peerId) {
                        const ra = remoteAudioElements[`${peerId}_analyser`];
                        if (ra) {
                            const arr = new Uint8Array(ra.frequencyBinCount);
                            ra.getByteFrequencyData(arr);
                            let sum = 0;
                            for (let i = 0; i < arr.length; i++) sum += arr[i];
                            return (sum / arr.length) / 255;
                        }
                    }
                    return origGetLevel();
                };
                // replace getAudioLevel for the animation loop
                window.__getAudioLevel = newGetLevel;

                // update speaker name from data connection if available
                const dataConn = connections[`${peerId}_data`];
                if (dataConn) {
                    dataConn.send({ type: 'name', name: currentName, emoji: getEmojiForName(currentName) });
                }
            }

            // -------- Override getAudioLevel for animation --------
            const origGetLevelFn = getAudioLevel;

            function getAudioLevelWrapper() {
                if (isTalking) {
                    // use local analyser
                    return origGetLevelFn();
                } else if (isSpeakerActive && speakerPeerId) {
                    const ra = remoteAudioElements[`${speakerPeerId}_analyser`];
                    if (ra) {
                        const arr = new Uint8Array(ra.frequencyBinCount);
                        ra.getByteFrequencyData(arr);
                        let sum = 0;
                        for (let i = 0; i < arr.length; i++) sum += arr[i];
                        return (sum / arr.length) / 255;
                    }
                    return 0;
                }
                return 0;
            }

            // replace
            const originalGetLevel = getAudioLevel;
            const newGetLevelFn = getAudioLevelWrapper;
            // we'll patch the animation loop to use this

            // -------- Start local audio --------
            async function startLocalAudio() {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        }
                    });
                    const ctx = initAudioContext();
                    const source = ctx.createMediaStreamSource(localStream);
                    source.connect(analyser);
                    // keep analyser connected
                    return true;
                } catch (err) {
                    console.error('Microphone error:', err);
                    showToast('❌ Microphone access denied. Please allow mic permissions.', 4000);
                    return false;
                }
            }

            // -------- Join room --------
            async function joinRoom() {
                const room = roomInput.value.trim() || 'demo-room';
                const name = nameInput.value.trim() || 'User';
                if (!room) {
                    showToast('Please enter a room name', 2000);
                    return;
                }
                if (!name) {
                    showToast('Please enter your name', 2000);
                    return;
                }

                currentRoom = room;
                currentName = name;

                joinBtn.disabled = true;
                joinBtn.textContent = '⏳ Connecting...';

                // Init audio
                const ok = await startLocalAudio();
                if (!ok) {
                    joinBtn.disabled = false;
                    joinBtn.innerHTML = '<span>🔊</span> Join &amp; Talk';
                    return;
                }

                // Create Peer
                const id = `${room}-${name}-${Date.now().toString(36)}`;
                myPeerId = id;
                peer = new Peer(id, {
                    debug: 2,
                });

                peer.on('open', (id) => {
                    myPeerId = id;
                    joinBtn.disabled = false;
                    joinBtn.innerHTML = '<span>🔊</span> Join &amp; Talk';
                    showToast(`✅ Connected to room: ${room}`, 2500);
                    // switch UI
                    joinScreen.style.display = 'none';
                    walkieScreen.classList.add('active');
                    roomNameDisplay.textContent = room;
                    speakerName.textContent = `${name} (you)`;
                    avatarEmoji.textContent = getEmojiForName(name);
                    peerIdToName[id] = name;
                    peerIdToEmoji[id] = getEmojiForName(name);
                    renderPeerList();
                    updateConnStatus();

                    // start animation
                    startAnimation();

                    // broadcast presence via data connections
                    // (handled when peers connect)
                });

                peer.on('connection', (conn) => {
                    const peerId = conn.peer;
                    conn.on('data', (data) => {
                        if (data.type === 'name') {
                            peerIdToName[peerId] = data.name;
                            peerIdToEmoji[peerId] = data.emoji || '👤';
                            renderPeerList();
                            if (speakerPeerId === peerId) {
                                speakerName.textContent = data.name;
                                avatarEmoji.textContent = data.emoji || '👤';
                            }
                        }
                    });
                    conn.on('open', () => {
                        conn.send({ type: 'name', name: currentName, emoji: getEmojiForName(currentName) });
                    });
                    connections[`${peerId}_data`] = conn;
                    renderPeerList();
                    updateConnStatus();
                });

                peer.on('call', (call) => {
                    handleIncomingCall(call);
                });

                peer.on('error', (err) => {
                    console.error('Peer error:', err);
                    showToast(`⚠️ Connection error: ${err.message || err}`, 3000);
                    updateConnStatus('error');
                });

                // Discovery: try to connect to existing peers in the room
                // We use a simple approach: broadcast our presence and discover via data connections
                // But PeerJS doesn't have a built-in discovery mechanism.
                // We'll use a simple "ping" approach: after joining, we'll try to connect to known peers
                // For this demo, we rely on incoming connections and manual discovery via the UI.

                // Also, we'll try to connect to any peer that we might know about
                // In a real app, you'd use a signaling server. For this demo,
                // we use a simple approach: when a new peer joins, they'll call us.

                // Show instructions
                showToast(`📡 Room: ${room} · Share your ID to invite others`, 3000);

                updateConnStatus('online');

                // Update peer list periodically
                setInterval(() => {
                    renderPeerList();
                }, 5000);
            }

            // -------- Leave room --------
            function leaveRoom() {
                // Close all connections
                Object.keys(connections).forEach(key => {
                    try {
                        connections[key].close();
                    } catch (_) {}
                });
                connections = {};
                remoteAudioElements = {};
                if (peer) {
                    peer.destroy();
                    peer = null;
                }
                if (localStream) {
                    localStream.getTracks().forEach(t => t.stop());
                    localStream = null;
                }
                if (audioContext) {
                    audioContext.close();
                    audioContext = null;
                    analyser = null;
                }
                stopAnimation();
                isTalking = false;
                isRecording = false;
                isSpeakerActive = false;
                speakerPeerId = null;
                peerIdToName = {};
                peerIdToEmoji = {};
                recordIcon.textContent = '⏺️';
                recordBtn.classList.remove('recording');
                talkBtn.classList.remove('talking');
                talkBtn.querySelector('.talk-label').textContent = 'Hold to Talk';
                talkBtn.querySelector('.mic-icon').textContent = '🎤';

                walkieScreen.classList.remove('active');
                joinScreen.style.display = 'flex';
                joinBtn.disabled = false;
                joinBtn.innerHTML = '<span>🔊</span> Join &amp; Talk';
                roomNameDisplay.textContent = '---';
                speakerName.textContent = 'Waiting...';
                avatarEmoji.textContent = '👤';
                resetBars();
                renderPeerList();
                updateConnStatus('offline');
                showToast('👋 Left the room', 2000);
            }

            // -------- Update connection status --------
            function updateConnStatus(state) {
                const count = Object.keys(connections).filter(k => !k.includes('_data')).length;
                if (state === 'online') {
                    connDot.className = 'status-dot online';
                    connText.textContent = `🟢 Connected · ${count} peer${count !== 1 ? 's' : ''}`;
                } else if (state === 'error') {
                    connDot.className = 'status-dot error';
                    connText.textContent = '⚠️ Connection issue';
                } else if (state === 'offline') {
                    connDot.className = 'status-dot';
                    connText.textContent = '⛔ Offline';
                } else {
                    connDot.className = 'status-dot online';
                    connText.textContent = `🟢 ${count} peer${count !== 1 ? 's' : ''} connected`;
                }
            }

            // -------- Talk (push-to-talk) --------
            function startTalking() {
                if (!localStream || !peer) return;
                if (isTalking) return;
                isTalking = true;
                talkBtn.classList.add('talking');
                talkBtn.querySelector('.talk-label').textContent = '🔴 Release to Stop';
                talkBtn.querySelector('.mic-icon').textContent = '🔊';

                // Enable local audio in all outgoing streams
                // With PeerJS, we just need to ensure we're sending audio
                // The localStream is already attached to all calls

                // Update UI
                speakerDisplay.classList.add('speaking');
                speakerAvatar.classList.add('speaking-avatar');
                ringEffect.classList.add('active');
                speakerName.classList.add('speaking-name');
                statusBadge.className = 'live-badge';
                statusText.textContent = '🔊 Speaking';

                // Start animation with local audio
                startAnimation();
            }

            function stopTalking() {
                if (!isTalking) return;
                isTalking = false;
                talkBtn.classList.remove('talking');
                talkBtn.querySelector('.talk-label').textContent = 'Hold to Talk';
                talkBtn.querySelector('.mic-icon').textContent = '🎤';

                // If no remote speaker, clear display
                if (!isSpeakerActive) {
                    speakerDisplay.classList.remove('speaking');
                    speakerAvatar.classList.remove('speaking-avatar');
                    ringEffect.classList.remove('active');
                    speakerName.classList.remove('speaking-name');
                    statusBadge.className = 'idle-badge';
                    statusText.textContent = 'Idle';
                    resetBars();
                } else {
                    // Remote speaker is active, keep their display
                }
            }

            // -------- Record --------
            function toggleRecording() {
                if (!localStream) {
                    showToast('No audio stream available', 2000);
                    return;
                }
                if (isRecording) {
                    // Stop recording
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                    isRecording = false;
                    recordBtn.classList.remove('recording');
                    recordIcon.textContent = '⏺️';
                    showToast('⏹️ Recording stopped', 2000);
                    return;
                }

                // Start recording
                try {
                    recordedChunks = [];
                    const stream = localStream.clone();
                    mediaRecorder = new MediaRecorder(stream, {
                        mimeType: 'audio/webm;codecs=opus'
                    });

                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) {
                            recordedChunks.push(e.data);
                        }
                    };

                    mediaRecorder.onstop = () => {
                        const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `walkie-recording-${Date.now()}.webm`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        setTimeout(() => URL.revokeObjectURL(url), 10000);
                        showToast('💾 Recording saved!', 3000);
                        recordedChunks = [];
                        stream.getTracks().forEach(t => t.stop());
                    };

                    mediaRecorder.start(1000);
                    isRecording = true;
                    recordBtn.classList.add('recording');
                    recordIcon.textContent = '🔴';
                    showToast('🔴 Recording...', 2000);
                } catch (err) {
                    console.error('Record error:', err);
                    showToast('❌ Could not start recording', 2500);
                }
            }

            // -------- Event listeners --------
            joinBtn.addEventListener('click', joinRoom);

            leaveBtn.addEventListener('click', () => {
                if (confirm('Leave the room?')) {
                    leaveRoom();
                }
            });

            // Talk button: press and hold (touch + mouse)
            talkBtn.addEventListener('mousedown', (e) => {
                e.preventDefault();

                startTalking();
            });
            talkBtn.addEventListener('mouseup', (e) => {
                e.preventDefault();
                stopTalking();
            });
            talkBtn.addEventListener('mouseleave', () => {
                stopTalking();
            });

            talkBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!peer) { showToast('Please join a room first', 2000); return; }
                startTalking();
            }, { passive: false });
            talkBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                stopTalking();
            }, { passive: false });
            talkBtn.addEventListener('touchcancel', (e) => {
                e.preventDefault();
                stopTalking();
            }, { passive: false });

            // Record button
            recordBtn.addEventListener('click', toggleRecording);

            // Enter key on join form
            roomInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinBtn.click(); });
            nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinBtn.click(); });

            // -------- Initial state --------
            joinScreen.style.display = 'flex';
            walkieScreen.classList.remove('active');
            updateConnStatus('offline');

            // Pre-fill with random name
            const randomName = ['Alex', 'Sam', 'Jordan', 'Taylor', 'Riley', 'Avery', 'Quinn', 'Morgan', 'Casey', 'Jamie'][
                Math.floor(Math.random() * 10)
            ] + Math.floor(Math.random() * 100);
            nameInput.value = randomName;

            // Override getAudioLevel in animation loop
            // Patch the animation loop to use our wrapper
            const origStartAnim = startAnimation;
            startAnimation = function() {
                if (animationId) return;
                let lastLevel = 0;
                let levelSmooth = 0;

                function loop() {
                    let level = 0;
                    if (isTalking) {
                        level = originalGetLevel();
                    } else if (isSpeakerActive && speakerPeerId) {
                        const ra = remoteAudioElements[`${speakerPeerId}_analyser`];
                        if (ra) {
                            const arr = new Uint8Array(ra.frequencyBinCount);
                            ra.getByteFrequencyData(arr);
                            let sum = 0;
                            for (let i = 0; i < arr.length; i++) sum += arr[i];
                            level = (sum / arr.length) / 255;
                        }
                    }
                    levelSmooth = levelSmooth * 0.6 + level * 0.4;
                    const displayLevel = Math.min(levelSmooth * 1.2, 1);

                    if (isTalking || isSpeakerActive) {
                        updateBars(displayLevel);
                    } else {
                        resetBars();
                    }

                    const isSpeakingNow = displayLevel > 0.05;
                    if (isSpeakingNow && (isTalking || isSpeakerActive)) {
                        speakerDisplay.classList.add('speaking');
                        speakerAvatar.classList.add('speaking-avatar');
                        ringEffect.classList.add('active');
                        speakerName.classList.add('speaking-name');
                        statusBadge.className = 'live-badge';
                        statusText.textContent = '🔊 Speaking';
                        isSpeakerActive = true;
                    } else if (isTalking || isSpeakerActive) {
                        if (isTalking) {
                            if (displayLevel < 0.03) {
                                speakerDisplay.classList.remove('speaking');
                                speakerAvatar.classList.remove('speaking-avatar');
                                ringEffect.classList.remove('active');
                                speakerName.classList.remove('speaking-name');
                                statusBadge.className = 'idle-badge';
                                statusText.textContent = '🎙️ Ready';
                            }
                        } else {
                            if (displayLevel < 0.03 && isSpeakerActive) {
                                isSpeakerActive = false;
                                speakerDisplay.classList.remove('speaking');
                                speakerAvatar.classList.remove('speaking-avatar');
                                ringEffect.classList.remove('active');
                                speakerName.classList.remove('speaking-name');
                                statusBadge.className = 'idle-badge';
                                statusText.textContent = 'Idle';
                                resetBars();
                            }
                        }
                    } else {
                        speakerDisplay.classList.remove('speaking');
                        speakerAvatar.classList.remove('speaking-avatar');
                        ringEffect.classList.remove('active');
                        speakerName.classList.remove('speaking-name');
                        statusBadge.className = 'idle-badge';
                        statusText.textContent = 'Idle';
                        resetBars();
                    }

                    animationId = requestAnimationFrame(loop);
                }
                loop();
            };

            // Also patch stopAnimation
            const origStopAnim = stopAnimation;
            stopAnimation = function() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                resetBars();
                if (!isTalking && !isSpeakerActive) {
                    speakerDisplay.classList.remove('speaking');
                    speakerAvatar.classList.remove('speaking-avatar');
                    ringEffect.classList.remove('active');
                    speakerName.classList.remove('speaking-name');
                    statusBadge.className = 'idle-badge';
                    statusText.textContent = 'Idle';
                    isSpeakerActive = false;
                }
            };

            console.log('📻 Walkie Talkie ready!');
            console.log('🔑 Join a room and start talking.');

            // Show initial toast
            setTimeout(() => {
                showToast('🎤 Enter a room name and join!', 3000);
            }, 500);

        })();
    </script>
