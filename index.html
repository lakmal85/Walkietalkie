<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Walkie Talkie Pro</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <!-- PeerJS -->
  <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
  <style>
    /* ===== RESET & BASE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --white: #ffffff;
      --green-primary: #2ecc71;
      --green-dark: #27ae60;
      --green-light: #a8f0c0;
      --yellow-primary: #f1c40f;
      --yellow-light: #f9e79f;
      --gray-light: #f5f7fa;
      --gray-mid: #e2e8f0;
      --gray-dark: #64748b;
      --text-dark: #1a202c;
      --shadow: 0 8px 32px rgba(0,0,0,0.10);
      --radius: 28px;
      --radius-sm: 16px;
      --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    html, body {
      height: 100%;
      width: 100%;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--white);
      color: var(--text-dark);
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-height: 100vh;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--white);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,0,0,0.06);
    }
    /* ===== STATUS BAR ===== */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-dark);
      background: var(--white);
      border-bottom: 1px solid var(--gray-light);
      flex-shrink: 0;
    }
    .status-bar .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      transition: var(--transition);
    }
    .status-dot.disconnected { background: #e74c3c; }
    .status-dot.connecting { background: var(--yellow-primary); animation: pulse-dot 0.8s ease-in-out infinite; }
    .status-dot.connected { background: var(--green-primary); }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.6; }
    }
    .status-bar .room-info {
      background: var(--gray-light);
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-dark);
      letter-spacing: 0.3px;
    }
    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px 12px;
      background: var(--white);
      flex-shrink: 0;
      border-bottom: 1px solid var(--gray-light);
    }
    .header h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 i {
      font-size: 18px;
      -webkit-text-fill-color: var(--green-primary);
      color: var(--green-primary);
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .header-actions button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--gray-light);
      color: var(--gray-dark);
      font-size: 16px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-actions button:active { transform: scale(0.92); }
    .header-actions button:hover { background: var(--gray-mid); }
    /* ===== SPEAKER SECTION ===== */
    .speaker-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 20px 12px;
      background: var(--white);
      flex-shrink: 0;
      min-height: 160px;
      border-bottom: 1px solid var(--gray-light);
      position: relative;
      overflow: hidden;
    }
    .speaker-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green-light), var(--green-primary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 700;
      color: var(--white);
      box-shadow: 0 4px 20px rgba(46,204,113,0.30);
      transition: var(--transition);
      position: relative;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .speaker-avatar .avatar-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 3px solid transparent;
      transition: var(--transition);
    }
    .speaker-avatar .avatar-ring.active {
      border-color: var(--yellow-primary);
      box-shadow: 0 0 0 4px rgba(241,196,15,0.25);
      animation: ring-pulse 1.2s ease-in-out infinite;
    }
    @keyframes ring-pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    .speaker-avatar .mic-indicator {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--yellow-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--white);
      box-shadow: 0 2px 12px rgba(241,196,15,0.40);
      transition: var(--transition);
    }
    .speaker-avatar .mic-indicator.muted {
      background: var(--gray-dark);
      box-shadow: none;
    }
    .speaker-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-dark);
      transition: var(--transition);
      text-align: center;
    }
    .speaker-name .name-label {
      font-weight: 400;
      color: var(--gray-dark);
      font-size: 13px;
    }
    .speaker-status {
      font-size: 12px;
      color: var(--gray-dark);
      font-weight: 500;
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .speaker-status .wave-bars {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 18px;
    }
    .speaker-status .wave-bars span {
      display: inline-block;
      width: 3px;
      background: var(--green-primary);
      border-radius: 4px;
      transition: var(--transition);
      animation: none;
    }
    .speaker-status .wave-bars.active span:nth-child(1) { animation: wave 0.6s ease-in-out infinite 0.0s; }
    .speaker-status .wave-bars.active span:nth-child(2) { animation: wave 0.6s ease-in-out infinite 0.1s; }
    .speaker-status .wave-bars.active span:nth-child(3) { animation: wave 0.6s ease-in-out infinite 0.2s; }
    .speaker-status .wave-bars.active span:nth-child(4) { animation: wave 0.6s ease-in-out infinite 0.3s; }
    .speaker-status .wave-bars.active span:nth-child(5) { animation: wave 0.6s ease-in-out infinite 0.4s; }
    @keyframes wave {
      0%, 100% { height: 4px; opacity: 0.4; }
      50% { height: 18px; opacity: 1; }
    }
    /* ===== PARTICIPANTS ===== */
    .participants-section {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 8px;
      background: var(--gray-light);
      min-height: 0;
    }
    .participants-section::-webkit-scrollbar { width: 3px; }
    .participants-section::-webkit-scrollbar-track { background: transparent; }
    .participants-section::-webkit-scrollbar-thumb { background: var(--gray-mid); border-radius: 10px; }
    .participants-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 12px;
      padding-bottom: 8px;
    }
    .participant-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--white);
      border-radius: var(--radius-sm);
      padding: 12px 6px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: var(--transition);
      border: 2px solid transparent;
      position: relative;
      cursor: default;
    }
    .participant-card.speaking {
      border-color: var(--yellow-primary);
      background: #fffbeb;
      transform: scale(1.03);
      box-shadow: 0 4px 20px rgba(241,196,15,0.18);
    }
    .participant-card .p-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green-light), var(--green-primary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      transition: var(--transition);
      flex-shrink: 0;
      margin-bottom: 4px;
    }
    .participant-card .p-avatar.speaking-avatar {
      animation: avatar-glow 0.8s ease-in-out infinite alternate;
    }
    @keyframes avatar-glow {
      0% { box-shadow: 0 0 0 0 rgba(241,196,15,0.3); }
      100% { box-shadow: 0 0 20px 6px rgba(241,196,15,0.25); }
    }
    .participant-card .p-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dark);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60px;
    }
    .participant-card .p-status {
      font-size: 8px;
      color: var(--gray-dark);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .participant-card .p-status.speaking-text {
      color: var(--yellow-dark);
      font-weight: 700;
    }
    .participant-card .p-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--green-primary);
      color: white;
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--white);
    }
    /* ===== CONTROLS ===== */
    .controls-section {
      padding: 12px 20px 20px;
      background: var(--white);
      border-top: 1px solid var(--gray-light);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    /* Mute toggle button (replaces PTT) */
    .mute-button {
      flex: 1;
      max-width: 280px;
      padding: 18px 24px;
      border: none;
      border-radius: 60px;
      background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
      color: var(--white);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 4px 24px rgba(46,204,113,0.35);
      touch-action: manipulation;
      -webkit-touch-callout: none;
      position: relative;
      overflow: hidden;
      min-height: 64px;
    }
    .mute-button:active { transform: scale(0.96); }
    .mute-button .btn-icon { font-size: 22px; }
    .mute-button .btn-label { transition: var(--transition); }
    .mute-button.muted {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      box-shadow: 0 4px 24px rgba(231,76,60,0.35);
    }
    .mute-button.muted:active { box-shadow: 0 2px 12px rgba(231,76,60,0.25); }
    .mute-button:disabled {
      opacity: 0.5;
      transform: none !important;
      cursor: not-allowed;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .controls-secondary {
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    .controls-secondary button {
      padding: 10px 18px;
      border: none;
      border-radius: 40px;
      background: var(--gray-light);
      color: var(--gray-dark);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
      touch-action: manipulation;
    }
    .controls-secondary button:active { transform: scale(0.94); }
    .controls-secondary button.active-btn {
      background: var(--green-light);
      color: var(--green-dark);
    }
    .controls-secondary button.record-btn {
      background: #fee2e2;
      color: #dc2626;
    }
    .controls-secondary button.record-btn.recording-active {
      background: #dc2626;
      color: white;
      animation: record-pulse 1s ease-in-out infinite;
    }
    @keyframes record-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    /* ===== SETUP OVERLAY ===== */
    .setup-overlay {
      position: absolute;
      inset: 0;
      background: var(--white);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 30px 20px 20px;
      overflow-y: auto;
      transition: var(--transition);
    }
    .setup-overlay.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.04);
    }
    .setup-overlay .setup-logo {
      font-size: 48px;
      color: var(--green-primary);
      margin-bottom: 4px;
    }
    .setup-overlay h2 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 2px;
      background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .setup-overlay .subtitle {
      color: var(--gray-dark);
      font-size: 14px;
      margin-bottom: 16px;
      text-align: center;
    }
    .setup-overlay .form-group {
      width: 100%;
      max-width: 360px;
      margin-bottom: 14px;
    }
    .setup-overlay .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 4px;
    }
    .setup-overlay .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--gray-mid);
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 500;
      outline: none;
      transition: var(--transition);
      background: var(--gray-light);
      color: var(--text-dark);
      font-family: inherit;
      text-align: center;
      letter-spacing: 2px;
    }
    .setup-overlay .form-group input:focus {
      border-color: var(--green-primary);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(46,204,113,0.10);
    }
    .setup-overlay .form-group input::placeholder {
      color: var(--gray-dark);
      opacity: 0.5;
      letter-spacing: 0;
    }
    .setup-overlay .btn-primary {
      width: 100%;
      max-width: 360px;
      padding: 14px;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
      color: var(--white);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 24px rgba(46,204,113,0.30);
      margin-top: 4px;
      font-family: inherit;
    }
    .setup-overlay .btn-primary:active { transform: scale(0.97); }
    .setup-overlay .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .setup-overlay .btn-secondary {
      width: 100%;
      max-width: 360px;
      padding: 12px;
      border: 2px solid var(--gray-mid);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-dark);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      margin-top: 8px;
    }
    .setup-overlay .btn-secondary:active {
      transform: scale(0.97);
      background: var(--gray-light);
    }
    .setup-overlay .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 360px;
      margin: 12px 0;
    }
    .setup-overlay .divider::before,
    .setup-overlay .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-mid);
    }
    .setup-overlay .divider span {
      font-size: 12px;
      color: var(--gray-dark);
      font-weight: 500;
      white-space: nowrap;
    }
    .setup-overlay .connection-help {
      font-size: 12px;
      color: var(--gray-dark);
      text-align: center;
      max-width: 360px;
      margin-top: 6px;
      line-height: 1.5;
    }
    .setup-overlay .connection-help code {
      background: var(--gray-light);
      padding: 2px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dark);
      word-break: break-all;
    }
    .mic-permission-banner {
      background: #fef9e7;
      border: 1px solid var(--yellow-light);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dark);
      margin: 0 16px 8px;
      flex-shrink: 0;
    }
    .mic-permission-banner i {
      color: var(--yellow-dark);
      font-size: 18px;
    }
    .mic-permission-banner button {
      background: var(--yellow-primary);
      border: none;
      padding: 6px 16px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-dark);
      font-family: inherit;
      white-space: nowrap;
    }
    .mic-permission-banner button:active { transform: scale(0.94); }
    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text-dark);
      color: var(--white);
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,0.20);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
      max-width: 90%;
      text-align: center;
      font-family: inherit;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }
    .toast.success { background: var(--green-dark); }
    .toast.error { background: #e74c3c; }
    .toast.warning { background: var(--yellow-dark); color: var(--text-dark); }
    /* ===== RESPONSIVE ===== */
    @media (min-width: 481px) {
      #app {
        border-radius: 32px;
        margin-top: 12px;
        margin-bottom: 12px;
        height: calc(100vh - 24px);
        max-height: 900px;
        box-shadow: 0 20px 80px rgba(0,0,0,0.12);
      }
      body {
        background: var(--gray-light);
        display: flex;
        align-items: center;
        justify-content: center;
      }
    }
    @media (max-width: 380px) {
      .speaker-avatar { width: 64px; height: 64px; font-size: 28px; }
      .speaker-name { font-size: 15px; }
      .mute-button { font-size: 15px; padding: 14px 18px; min-height: 54px; }
      .participants-grid { grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; }
      .participant-card .p-avatar { width: 36px; height: 36px; font-size: 14px; }
      .header h1 { font-size: 17px; }
    }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gray-mid); border-radius: 10px; }
    .hidden { display: none !important; }
    .flex-center { display: flex; align-items: center; justify-content: center; }
    /* ===== ANIMATIONS ===== */
    .speaker-name.pop {
      animation: name-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes name-pop {
      0% { transform: scale(0.8); opacity: 0.3; }
      100% { transform: scale(1); opacity: 1; }
    }
    .speaker-avatar.recording-avatar .avatar-ring {
      border-color: #e74c3c !important;
      animation: ring-pulse-red 0.6s ease-in-out infinite !important;
    }
    @keyframes ring-pulse-red {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231,76,60,0.3); }
      50% { transform: scale(1.12); box-shadow: 0 0 24px 8px rgba(231,76,60,0.20); }
    }
    .network-badge {
      font-size: 10px;
      color: var(--gray-dark);
      background: var(--gray-light);
      padding: 2px 12px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }
    .network-badge i { font-size: 10px; }
  </style>
</head>
<body>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast"></div>

  <!-- ===== APP ===== -->
  <div id="app">

    <!-- ===== SETUP OVERLAY ===== -->
    <div id="setupOverlay" class="setup-overlay">
      <div class="setup-logo"><i class="fas fa-walkie-talkie"></i></div>
      <h2>Walkie Talkie</h2>
      <p class="subtitle">Real‑time group voice • full‑duplex</p>

      <div id="stepRole" style="width:100%; max-width:360px;">
        <div class="form-group">
          <label>Your Name</label>
          <input id="userNameInput" type="text" placeholder="Enter your name" value="User" maxlength="20" />
        </div>
        <div class="form-group">
          <label>12‑Digit Room PIN</label>
          <input id="pinInput" type="text" placeholder="e.g. 123456789012" maxlength="12" inputmode="numeric" pattern="\d*" />
        </div>
        <button id="createRoomBtn" class="btn-primary"><i class="fas fa-plus-circle"></i> Create Room (Host)</button>
        <div class="divider"><span>or</span></div>
        <button id="joinRoomBtn" class="btn-secondary"><i class="fas fa-sign-in-alt"></i> Join Room (Guest)</button>
        <div class="connection-help" style="margin-top:12px;">
          <i class="fas fa-info-circle"></i> Enter the same 12‑digit PIN to connect.<br />
          <span style="font-size:11px; opacity:0.7;">All participants hear each other simultaneously.</span>
        </div>
      </div>

      <div class="mic-permission-banner hidden" id="micBanner" style="max-width:360px;margin-top:12px;">
        <i class="fas fa-microphone-slash"></i>
        <span>Microphone access required</span>
        <button id="requestMicBtn">Allow</button>
      </div>
    </div>

    <!-- ===== STATUS BAR ===== -->
    <div class="status-bar">
      <div class="connection-status">
        <span class="status-dot disconnected" id="statusDot"></span>
        <span id="statusText">Disconnected</span>
      </div>
      <div class="room-info" id="roomInfo">Room: ---</div>
    </div>

    <!-- ===== HEADER ===== -->
    <div class="header">
      <h1><i class="fas fa-walkie-talkie"></i> Walkie</h1>
      <div class="header-actions">
        <button id="speakerToggle" title="Toggle Speaker"><i class="fas fa-volume-up"></i></button>
        <button id="leaveRoomBtn" title="Leave Room"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>

    <!-- ===== SPEAKER SECTION ===== -->
    <div class="speaker-section" id="speakerSection">
      <div class="speaker-avatar" id="speakerAvatar">
        <span id="avatarInitials">U</span>
        <div class="avatar-ring" id="avatarRing"></div>
        <div class="mic-indicator" id="micIndicator"><i class="fas fa-microphone"></i></div>
      </div>
      <div class="speaker-name" id="speakerName">
        <span id="displayName">You</span>
        <span class="name-label" id="nameLabel">(You)</span>
      </div>
      <div class="speaker-status" id="speakerStatus">
        <span id="statusLabel">Ready</span>
        <div class="wave-bars" id="waveBars">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
      <div class="network-badge"><i class="fas fa-users"></i> <span id="participantCount">0</span> connected</div>
    </div>

    <!-- ===== PARTICIPANTS ===== -->
    <div class="participants-section" id="participantsSection">
      <div class="participants-grid" id="participantsGrid">
        <!-- Dynamic participants -->
      </div>
    </div>

    <!-- ===== CONTROLS ===== -->
    <div class="controls-section">
      <div class="controls-row">
        <button class="mute-button" id="muteToggleBtn" disabled>
          <span class="btn-icon"><i class="fas fa-microphone"></i></span>
          <span class="btn-label">Unmuted</span>
        </button>
      </div>
      <div class="controls-secondary">
        <button id="recordBtn" class="record-btn"><i class="fas fa-circle"></i> Record</button>
        <button id="muteBtn" class="active-btn"><i class="fas fa-microphone"></i> Mic</button>
      </div>
    </div>

  </div>

  <script>
    (function() {
      'use strict';

      // ----- DOM refs -----
      const $ = id => document.getElementById(id);
      const dom = {
        setupOverlay: $('setupOverlay'),
        userNameInput: $('userNameInput'),
        pinInput: $('pinInput'),
        createRoomBtn: $('createRoomBtn'),
        joinRoomBtn: $('joinRoomBtn'),
        micBanner: $('micBanner'),
        requestMicBtn: $('requestMicBtn'),
        statusDot: $('statusDot'),
        statusText: $('statusText'),
        roomInfo: $('roomInfo'),
        speakerAvatar: $('speakerAvatar'),
        avatarInitials: $('avatarInitials'),
        avatarRing: $('avatarRing'),
        micIndicator: $('micIndicator'),
        displayName: $('displayName'),
        nameLabel: $('nameLabel'),
        statusLabel: $('statusLabel'),
        waveBars: $('waveBars'),
        participantsGrid: $('participantsGrid'),
        muteToggleBtn: $('muteToggleBtn'),
        recordBtn: $('recordBtn'),
        muteBtn: $('muteBtn'),
        speakerToggle: $('speakerToggle'),
        leaveRoomBtn: $('leaveRoomBtn'),
        toast: $('toast'),
        participantCount: $('participantCount'),
      };

      // ----- State -----
      const state = {
        userName: 'User',
        pin: '',
        isHost: false,
        isConnected: false,
        isMuted: false,          // local mute state
        isRecording: false,
        isSpeakerOn: true,
        localStream: null,
        peer: null,
        calls: new Map(),
        dataConns: new Map(),
        peers: new Map(),        // key: peerId, value: { name, stream, isSpeaking, _audioElement }
        myId: '',
        hostId: '',
        audioContext: null,
        analyser: null,
        dataArray: null,
        speakingInterval: null,
        isSpeakingNow: false,    // local voice activity
        currentSpeakerId: null,  // which peer is currently displayed in the speaker section
        // We will rely on voice activity detection, not PTT.
      };

      // ----- Helpers -----
      function getInitials(name) { return name.charAt(0).toUpperCase(); }
      function randomColor() {
        const colors = ['#2ecc71', '#f1c40f', '#3498db', '#e74c3c', '#9b59b6', '#1abc9c', '#e67e22'];
        return colors[Math.floor(Math.random() * colors.length)];
      }

      function toast(msg, type = 'info', duration = 2500) {
        const el = dom.toast;
        el.textContent = msg;
        el.className = 'toast ' + type;
        void el.offsetWidth;
        el.classList.add('show');
        clearTimeout(el._timer);
        el._timer = setTimeout(() => el.classList.remove('show'), duration);
      }

      function updateStatus(status, text) {
        dom.statusDot.className = 'status-dot ' + status;
        dom.statusText.textContent = text;
      }

      function updateRoomInfo(code) {
        dom.roomInfo.textContent = code ? 'Room: ' + code : 'Room: ---';
      }

      // ----- UI Updates -----
      function updateSpeaker(name, isSpeaking, isRecording, isSelf = false) {
        const initials = getInitials(name);
        dom.avatarInitials.textContent = initials;
        dom.displayName.textContent = name;
        dom.nameLabel.textContent = isSelf ? '(You)' : '';

        const ring = dom.avatarRing;
        ring.className = 'avatar-ring';
        if (isSpeaking) ring.classList.add('active');
        if (isRecording) dom.speakerAvatar.classList.add('recording-avatar');
        else dom.speakerAvatar.classList.remove('recording-avatar');

        const micIcon = dom.micIndicator.querySelector('i');
        if (state.isMuted && isSelf) {
          micIcon.className = 'fas fa-microphone-slash';
          dom.micIndicator.className = 'mic-indicator muted';
        } else {
          micIcon.className = 'fas fa-microphone';
          dom.micIndicator.className = 'mic-indicator';
        }

        if (isSpeaking) {
          dom.statusLabel.textContent = 'Speaking...';
          dom.waveBars.classList.add('active');
        } else if (isRecording) {
          dom.statusLabel.textContent = 'Recording...';
          dom.waveBars.classList.remove('active');
        } else {
          dom.statusLabel.textContent = state.isMuted && isSelf ? 'Muted' : 'Ready';
          dom.waveBars.classList.remove('active');
        }

        dom.displayName.classList.remove('pop');
        void dom.displayName.offsetWidth;
        dom.displayName.classList.add('pop');
      }

      function renderParticipants() {
        const grid = dom.participantsGrid;
        grid.innerHTML = '';
        // Self
        const selfCard = createParticipantCard(state.userName, true, state.isSpeakingNow);
        grid.appendChild(selfCard);
        // Others
        for (const [id, p] of state.peers) {
          if (id === state.myId) continue;
          const card = createParticipantCard(p.name, false, p.isSpeaking || false);
          card.dataset.peerId = id;
          grid.appendChild(card);
        }
        dom.participantCount.textContent = state.peers.size + 1; // + self
      }

      function createParticipantCard(name, isSelf, isSpeaking) {
        const div = document.createElement('div');
        div.className = 'participant-card' + (isSpeaking ? ' speaking' : '');
        const initials = getInitials(name);
        const color = randomColor();
        div.innerHTML = `
          <div class="p-avatar ${isSpeaking ? 'speaking-avatar' : ''}" style="background:${color}">${initials}</div>
          <div class="p-name">${name}</div>
          <div class="p-status ${isSpeaking ? 'speaking-text' : ''}">${isSelf ? 'You' : ''} ${isSpeaking ? '🔊' : ''}</div>
          ${isSelf ? '<div class="p-badge"><i class="fas fa-check"></i></div>' : ''}
        `;
        return div;
      }

      function updatePeerSpeaking(peerId, isSpeaking) {
        const cards = dom.participantsGrid.querySelectorAll('.participant-card');
        for (const card of cards) {
          if (card.dataset.peerId === peerId) {
            card.classList.toggle('speaking', isSpeaking);
            const avatar = card.querySelector('.p-avatar');
            if (avatar) avatar.classList.toggle('speaking-avatar', isSpeaking);
            const status = card.querySelector('.p-status');
            if (status) {
              status.classList.toggle('speaking-text', isSpeaking);
              status.textContent = isSpeaking ? '🔊' : '';
            }
            break;
          }
        }
        // Update speaker section if this peer is the current speaker
        if (isSpeaking && peerId === state.currentSpeakerId) {
          const p = state.peers.get(peerId);
          if (p) updateSpeaker(p.name, true, false, false);
        } else if (!isSpeaking && peerId === state.currentSpeakerId) {
          findNewSpeaker();
        }
      }

      function findNewSpeaker() {
        // Find any peer that is speaking
        for (const [id, p] of state.peers) {
          if (p.isSpeaking) {
            state.currentSpeakerId = id;
            updateSpeaker(p.name, true, false, false);
            return;
          }
        }
        // No one speaking, show self
        state.currentSpeakerId = state.myId;
        updateSpeaker(state.userName, state.isSpeakingNow || false, state.isRecording, true);
      }

      // ----- PeerJS with local network optimization -----
      function createPeerOptions() {
        return {
          debug: 2,
          config: {
            iceServers: [
              { urls: 'stun:stun.l.google.com:19302' },
              { urls: 'stun:stun1.l.google.com:19302' },
              { urls: 'stun:stun.ekiga.net' }
            ],
            iceTransportPolicy: 'all',
            bundlePolicy: 'max-bundle',
            rtcpMuxPolicy: 'require',
          }
        };
      }

      async function initPeer(isHost, pin) {
        return new Promise((resolve, reject) => {
          const options = createPeerOptions();
          let peer;
          if (isHost) {
            peer = new Peer(pin, options);
          } else {
            peer = new Peer(options);
          }
          const timeout = setTimeout(() => {
            if (peer && !peer.destroyed) peer.destroy();
            reject(new Error('PeerJS connection timeout'));
          }, 15000);
          peer.on('open', (id) => {
            clearTimeout(timeout);
            state.myId = id;
            resolve(peer);
          });
          peer.on('error', (err) => {
            clearTimeout(timeout);
            reject(err);
          });
        });
      }

      // ----- Data message handling -----
      function handleDataMessage(data, peerId) {
        const { type, name, isSpeaking } = data;
        if (type === 'peer-info') {
          if (state.peers.has(peerId)) {
            state.peers.get(peerId).name = name;
          } else {
            state.peers.set(peerId, { name: name, stream: null, isSpeaking: false });
          }
          renderParticipants();
        } else if (type === 'speaking') {
          if (state.peers.has(peerId)) {
            state.peers.get(peerId).isSpeaking = isSpeaking;
            if (isSpeaking) {
              state.currentSpeakerId = peerId;
              updateSpeaker(name || state.peers.get(peerId).name, true, false, false);
            } else {
              if (state.currentSpeakerId === peerId) {
                findNewSpeaker();
              }
            }
            updatePeerSpeaking(peerId, isSpeaking);
            renderParticipants();
          }
        } else if (type === 'recording-status') {
          toast((name || 'Someone') + (isSpeaking ? ' started recording' : ' stopped recording'), 'info', 1500);
        } else if (type === 'peer-list') {
          const list = data.list; // array of {id, name}
          for (const item of list) {
            if (item.id === state.myId || item.id === state.hostId) continue;
            initiateConnectionToPeer(item.id, item.name);
          }
        }
      }

      // ----- Initiate connection to a peer (guest to existing guest) -----
      function initiateConnectionToPeer(peerId, peerName) {
        if (state.calls.has(peerId)) return;
        const call = state.peer.call(peerId, state.localStream);
        state.calls.set(peerId, call);
        call.on('stream', (stream) => {
          handleRemoteStream(peerId, stream);
        });
        call.on('close', () => {
          removePeer(peerId);
        });
        const conn = state.peer.connect(peerId);
        conn.on('open', () => {
          state.dataConns.set(peerId, conn);
          conn.send({ type: 'peer-info', name: state.userName });
          // Also send our speaking status? Not needed initially.
        });
        conn.on('data', (data) => handleDataMessage(data, peerId));
        conn.on('close', () => {
          removePeer(peerId);
        });
        if (!state.peers.has(peerId)) {
          state.peers.set(peerId, { name: peerName || 'Peer', stream: null, isSpeaking: false });
        } else {
          state.peers.get(peerId).name = peerName || state.peers.get(peerId).name;
        }
        renderParticipants();
      }

      // ----- Handle incoming call -----
      function handleIncomingCall(call) {
        const peerId = call.peer;
        call.answer(state.localStream);
        state.calls.set(peerId, call);
        call.on('stream', (stream) => {
          handleRemoteStream(peerId, stream);
        });
        call.on('close', () => {
          removePeer(peerId);
        });
        if (!state.dataConns.has(peerId)) {
          const conn = state.peer.connect(peerId);
          conn.on('open', () => {
            state.dataConns.set(peerId, conn);
            conn.send({ type: 'peer-info', name: state.userName });
            if (state.isHost) {
              sendPeerList(conn);
            }
          });
          conn.on('data', (data) => handleDataMessage(data, peerId));
          conn.on('close', () => removePeer(peerId));
        }
        if (!state.peers.has(peerId)) {
          state.peers.set(peerId, { name: 'Guest', stream: null, isSpeaking: false });
        }
        renderParticipants();
        toast('New participant joined', 'success', 1500);
      }

      // ----- Handle remote stream -----
      function handleRemoteStream(peerId, stream) {
        if (state.peers.has(peerId)) {
          state.peers.get(peerId).stream = stream;
        } else {
          state.peers.set(peerId, { name: 'Peer', stream: stream, isSpeaking: false });
        }
        const audio = new Audio();
        audio.srcObject = stream;
        audio.autoplay = true;
        audio.muted = false;
        if (!state.isSpeakerOn) audio.muted = true;
        audio.play().catch(err => console.warn('Audio play error:', err));
        state.peers.get(peerId)._audioElement = audio;
        renderParticipants();
        if (!state.isConnected) {
          state.isConnected = true;
          updateStatus('connected', 'Connected');
          dom.statusDot.className = 'status-dot connected';
          dom.muteToggleBtn.disabled = false;
          toast('Connected! Talk freely.', 'success', 1500);
          startSpeakingDetection();
        }
        if (state.currentSpeakerId === peerId) {
          const p = state.peers.get(peerId);
          if (p) updateSpeaker(p.name, p.isSpeaking || false, false, false);
        }
        if (!state.currentSpeakerId) {
          state.currentSpeakerId = state.myId;
          updateSpeaker(state.userName, state.isSpeakingNow || false, state.isRecording, true);
        }
      }

      // ----- Send peer list (host only) -----
      function sendPeerList(conn) {
        const list = [];
        for (const [id, p] of state.peers) {
          if (id !== conn.peer && id !== state.myId) {
            list.push({ id, name: p.name });
          }
        }
        conn.send({ type: 'peer-list', list: list });
      }

      // ----- Remove peer -----
      function removePeer(peerId) {
        if (state.calls.has(peerId)) {
          const call = state.calls.get(peerId);
          call.close();
          state.calls.delete(peerId);
        }
        if (state.dataConns.has(peerId)) {
          const conn = state.dataConns.get(peerId);
          conn.close();
          state.dataConns.delete(peerId);
        }
        if (state.peers.has(peerId)) {
          const p = state.peers.get(peerId);
          if (p._audioElement) {
            p._audioElement.pause();
            p._audioElement.srcObject = null;
          }
          state.peers.delete(peerId);
          renderParticipants();
          toast('Peer disconnected', 'warning', 1500);
          if (state.currentSpeakerId === peerId) {
            findNewSpeaker();
          }
        }
        if (state.peers.size === 0 && state.isConnected) {
          if (!state.isHost) {
            toast('All peers disconnected', 'error', 2000);
            leaveRoom();
          } else {
            updateStatus('connecting', 'Waiting for guests...');
            dom.statusDot.className = 'status-dot connecting';
            toast('Waiting for guests...', 'info', 2000);
          }
        }
      }

      // ----- Host logic -----
      async function startHost() {
        try {
          const pin = dom.pinInput.value.trim();
          if (!/^\d{12}$/.test(pin)) {
            toast('Please enter a valid 12‑digit numeric PIN.', 'warning', 1500);
            return;
          }
          state.pin = pin;
          state.isHost = true;
          state.hostId = pin;
          state.userName = dom.userNameInput.value.trim() || 'User';

          await requestMicrophone();

          state.peer = await initPeer(true, pin);
          toast('Room created! Share the PIN with others.', 'success', 2000);
          updateStatus('connecting', 'Waiting for guests...');
          dom.statusDot.className = 'status-dot connecting';
          updateRoomInfo(pin);
          dom.setupOverlay.classList.add('hidden');
          state.peers.set(state.myId, { name: state.userName, stream: null, isSpeaking: false });
          renderParticipants();
          updateSpeaker(state.userName, false, false, true);
          state.currentSpeakerId = state.myId;
          dom.muteToggleBtn.disabled = false;
          // Enable local audio
          if (state.localStream) {
            state.localStream.getAudioTracks().forEach(t => t.enabled = !state.isMuted);
          }

          state.peer.on('call', handleIncomingCall);
          state.peer.on('connection', (conn) => {
            conn.on('open', () => {
              state.dataConns.set(conn.peer, conn);
              conn.send({ type: 'peer-info', name: state.userName });
              if (state.isHost) {
                sendPeerList(conn);
              }
            });
            conn.on('data', (data) => handleDataMessage(data, conn.peer));
            conn.on('close', () => removePeer(conn.peer));
          });
        } catch (err) {
          console.error(err);
          if (err.type === 'unavailable-id') {
            toast('This PIN is already in use. Please choose another.', 'error', 3000);
          } else {
            toast('Failed to create room: ' + err.message, 'error', 3000);
          }
          dom.setupOverlay.classList.remove('hidden');
          updateStatus('disconnected', 'Disconnected');
          dom.statusDot.className = 'status-dot disconnected';
        }
      }

      // ----- Guest logic -----
      async function startGuest() {
        try {
          const pin = dom.pinInput.value.trim();
          if (!/^\d{12}$/.test(pin)) {
            toast('Please enter a valid 12‑digit numeric PIN.', 'warning', 1500);
            return;
          }
          state.pin = pin;
          state.isHost = false;
          state.hostId = pin;
          state.userName = dom.userNameInput.value.trim() || 'User';

          await requestMicrophone();

          state.peer = await initPeer(false, pin);
          toast('Connecting to room...', 'info', 1500);
          updateStatus('connecting', 'Connecting...');
          dom.statusDot.className = 'status-dot connecting';
          updateRoomInfo(pin);
          dom.setupOverlay.classList.add('hidden');
          state.peers.set(state.myId, { name: state.userName, stream: null, isSpeaking: false });
          renderParticipants();
          updateSpeaker(state.userName, false, false, true);
          state.currentSpeakerId = state.myId;

          state.peer.on('call', handleIncomingCall);
          state.peer.on('connection', (conn) => {
            conn.on('open', () => {
              state.dataConns.set(conn.peer, conn);
              conn.send({ type: 'peer-info', name: state.userName });
            });
            conn.on('data', (data) => handleDataMessage(data, conn.peer));
            conn.on('close', () => removePeer(conn.peer));
          });

          // Connect to host
          const call = state.peer.call(pin, state.localStream);
          state.calls.set(pin, call);
          call.on('stream', (stream) => {
            handleRemoteStream(pin, stream);
          });
          call.on('close', () => {
            removePeer(pin);
          });
          const conn = state.peer.connect(pin);
          conn.on('open', () => {
            state.dataConns.set(pin, conn);
            conn.send({ type: 'peer-info', name: state.userName });
          });
          conn.on('data', (data) => handleDataMessage(data, pin));
          conn.on('close', () => removePeer(pin));

          if (!state.peers.has(pin)) {
            state.peers.set(pin, { name: 'Host', stream: null, isSpeaking: false });
          }
          renderParticipants();

          setTimeout(() => {
            if (!state.isConnected && !state.calls.has(pin)) {
              toast('Host not found. Please check the PIN.', 'error', 3000);
              leaveRoom();
            }
          }, 8000);

        } catch (err) {
          console.error(err);
          toast('Failed to join: ' + err.message, 'error', 3000);
          dom.setupOverlay.classList.remove('hidden');
          updateStatus('disconnected', 'Disconnected');
          dom.statusDot.className = 'status-dot disconnected';
        }
      }

      // ----- Microphone -----
      async function requestMicrophone() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
              sampleRate: 48000,
            }
          });
          state.localStream = stream;
          dom.micBanner.classList.add('hidden');
          state.isMuted = false;
          updateSpeaker(state.userName, false, false, true);
          // Enable audio tracks by default
          stream.getAudioTracks().forEach(t => t.enabled = true);
          return stream;
        } catch (err) {
          console.error('Mic error:', err);
          dom.micBanner.classList.remove('hidden');
          toast('Microphone access is required!', 'error', 3000);
          throw err;
        }
      }

      // ----- Speaking detection (always on, no PTT) -----
      function startSpeakingDetection() {
        if (state.speakingInterval) return;
        if (!state.localStream) return;
        try {
          state.audioContext = new(window.AudioContext || window.webkitAudioContext)();
          state.analyser = state.audioContext.createAnalyser();
          state.analyser.fftSize = 512;
          const source = state.audioContext.createMediaStreamSource(state.localStream);
          source.connect(state.analyser);
          state.dataArray = new Uint8Array(state.analyser.fftSize);
          let lastState = false;
          state.speakingInterval = setInterval(() => {
            if (!state.analyser) return;
            state.analyser.getByteTimeDomainData(state.dataArray);
            let sum = 0;
            for (let i = 0; i < state.dataArray.length; i++) {
              const val = (state.dataArray[i] - 128) / 128;
              sum += val * val;
            }
            const rms = Math.sqrt(sum / state.dataArray.length);
            const threshold = 0.05;
            // Speaking if RMS > threshold and not muted
            const speaking = rms > threshold && !state.isMuted;
            if (speaking !== lastState) {
              lastState = speaking;
              if (speaking) {
                state.isSpeakingNow = true;
                updateSpeaker(state.userName, true, false, true);
                broadcastSpeaking(true);
                renderParticipants();
              } else if (!speaking && state.isSpeakingNow) {
                state.isSpeakingNow = false;
                updateSpeaker(state.userName, false, false, true);
                broadcastSpeaking(false);
                renderParticipants();
              }
            }
          }, 150);
        } catch (err) {
          console.warn('Speaking detection not available', err);
        }
      }

      function broadcastSpeaking(isSpeaking) {
        for (const [id, conn] of state.dataConns) {
          if (conn.open) {
            conn.send({ type: 'speaking', isSpeaking: isSpeaking, name: state.userName });
          }
        }
      }

      // ----- Mute toggle (replaces PTT) -----
      function toggleMute() {
        state.isMuted = !state.isMuted;
        if (state.localStream) {
          state.localStream.getAudioTracks().forEach(t => t.enabled = !state.isMuted);
        }
        const btn = dom.muteToggleBtn;
        if (state.isMuted) {
          btn.classList.add('muted');
          btn.querySelector('.btn-icon').innerHTML = '<i class="fas fa-microphone-slash"></i>';
          btn.querySelector('.btn-label').textContent = 'Muted';
        } else {
          btn.classList.remove('muted');
          btn.querySelector('.btn-icon').innerHTML = '<i class="fas fa-microphone"></i>';
          btn.querySelector('.btn-label').textContent = 'Unmuted';
        }
        // Update mic indicator
        updateSpeaker(state.userName, state.isSpeakingNow || false, state.isRecording, true);
        // If we were speaking, stop broadcasting
        if (state.isMuted && state.isSpeakingNow) {
          state.isSpeakingNow = false;
          broadcastSpeaking(false);
          renderParticipants();
        }
        toast(state.isMuted ? 'Mic muted' : 'Mic unmuted', 'info', 1200);
      }

      // ----- Recording -----
      let mediaRecorder = null;
      let recordedChunks = [];

      function toggleRecording() {
        if (!state.localStream) { toast('No microphone', 'error', 1500); return; }
        if (state.isRecording) {
          if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
          state.isRecording = false;
          dom.recordBtn.classList.remove('recording-active');
          dom.recordBtn.innerHTML = '<i class="fas fa-circle"></i> Record';
          toast('Recording stopped', 'info', 1500);
          broadcastRecordingStatus(false);
          updateSpeaker(state.userName, state.isSpeakingNow || false, false, true);
        } else {
          try {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(state.localStream, { mimeType: 'audio/webm;codecs=opus' });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
              const blob = new Blob(recordedChunks, { type: 'audio/webm' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = `walkie-${Date.now()}.webm`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              setTimeout(() => URL.revokeObjectURL(url), 5000);
              toast('Recording saved!', 'success', 2000);
              recordedChunks = [];
            };
            mediaRecorder.start(1000);
            state.isRecording = true;
            dom.recordBtn.classList.add('recording-active');
            dom.recordBtn.innerHTML = '<i class="fas fa-stop"></i> Stop';
            toast('🔴 Recording started', 'warning', 1500);
            broadcastRecordingStatus(true);
            updateSpeaker(state.userName, state.isSpeakingNow || false, true, true);
          } catch (err) {
            console.error(err);
            toast('Recording failed: ' + err.message, 'error', 2000);
          }
        }
      }

      function broadcastRecordingStatus(isRecording) {
        for (const [id, conn] of state.dataConns) {
          if (conn.open) {
            conn.send({ type: 'recording-status', isRecording: isRecording, name: state.userName });
          }
        }
      }

      // ----- Speaker toggle -----
      function toggleSpeaker() {
        state.isSpeakerOn = !state.isSpeakerOn;
        dom.speakerToggle.innerHTML = state.isSpeakerOn ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
        for (const [id, p] of state.peers) {
          if (p._audioElement) {
            p._audioElement.muted = !state.isSpeakerOn;
          }
        }
        toast(state.isSpeakerOn ? 'Speaker ON' : 'Speaker OFF', 'info', 1200);
      }

      // ----- Leave room -----
      function leaveRoom() {
        if (state.peer) {
          state.peer.destroy();
          state.peer = null;
        }
        for (const [id, call] of state.calls) {
          call.close();
        }
        state.calls.clear();
        for (const [id, conn] of state.dataConns) {
          conn.close();
        }
        state.dataConns.clear();
        for (const [id, p] of state.peers) {
          if (p._audioElement) {
            p._audioElement.pause();
            p._audioElement.srcObject = null;
          }
        }
        state.peers.clear();
        if (state.speakingInterval) {
          clearInterval(state.speakingInterval);
          state.speakingInterval = null;
        }
        if (state.audioContext) {
          state.audioContext.close();
          state.audioContext = null;
        }
        state.isConnected = false;
        state.isSpeakingNow = false;
        updateStatus('disconnected', 'Disconnected');
        dom.statusDot.className = 'status-dot disconnected';
        updateRoomInfo('');
        dom.setupOverlay.classList.remove('hidden');
        dom.participantsGrid.innerHTML = '';
        updateSpeaker('---', false, false);
        dom.muteToggleBtn.disabled = true;
        dom.muteToggleBtn.classList.remove('muted');
        dom.muteToggleBtn.querySelector('.btn-icon').innerHTML = '<i class="fas fa-microphone"></i>';
        dom.muteToggleBtn.querySelector('.btn-label').textContent = 'Unmuted';
        dom.participantCount.textContent = '0';
        if (state.isRecording) {
          if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
          state.isRecording = false;
          dom.recordBtn.classList.remove('recording-active');
          dom.recordBtn.innerHTML = '<i class="fas fa-circle"></i> Record';
        }
        if (state.isMuted) {
          // Reset mute state
          state.isMuted = false;
          if (state.localStream) {
            state.localStream.getAudioTracks().forEach(t => t.enabled = true);
          }
        }
        toast('Left the room', 'info', 1500);
        state.pin = '';
        state.isHost = false;
        state.hostId = '';
        state.currentSpeakerId = null;
        state.isConnected = false;
      }

      // ----- UI Events -----
      function setupUI() {
        dom.createRoomBtn.addEventListener('click', startHost);
        dom.joinRoomBtn.addEventListener('click', startGuest);

        // Mute toggle (main button)
        dom.muteToggleBtn.addEventListener('click', toggleMute);

        // Secondary mic button (synced)
        dom.muteBtn.addEventListener('click', toggleMute);

        dom.recordBtn.addEventListener('click', toggleRecording);
        dom.speakerToggle.addEventListener('click', toggleSpeaker);
        dom.leaveRoomBtn.addEventListener('click', () => {
          if (confirm('Leave the room?')) leaveRoom();
        });
        dom.requestMicBtn.addEventListener('click', async () => {
          try {
            await requestMicrophone();
            toast('Microphone enabled', 'success', 1500);
          } catch (err) { toast('Mic permission denied', 'error', 2000); }
        });

        dom.pinInput.addEventListener('input', (e) => {
          e.target.value = e.target.value.replace(/\D/g, '').slice(0, 12);
        });

        setTimeout(async () => {
          try { await requestMicrophone(); } catch (e) { dom.micBanner.classList.remove('hidden'); }
        }, 500);
      }

      // ----- Init -----
      function init() {
        setupUI();
        updateStatus('disconnected', 'Disconnected');
        dom.statusDot.className = 'status-dot disconnected';
        updateRoomInfo('');
        updateSpeaker('---', false, false);
        dom.setupOverlay.classList.remove('hidden');
        dom.muteToggleBtn.disabled = true;
        renderParticipants();
        dom.participantCount.textContent = '0';
      }

      window.addEventListener('beforeunload', () => {
        if (state.peer) state.peer.destroy();
        if (state.localStream) state.localStream.getTracks().forEach(t => t.stop());
        if (state.audioContext) state.audioContext.close();
      });

      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && state.localStream && state.isConnected) {
          state.localStream.getAudioTracks().forEach(t => {
            if (!state.isMuted) t.enabled = true;
          });
        }
      });

      init();
    })();
  </script>
</body>
</html>
